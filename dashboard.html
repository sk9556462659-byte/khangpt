<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhanGPT Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #14141f;
            --bg-card: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #6366f1;
            --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gold: #f59e0b;
            --border: rgba(255,255,255,0.1);
        }

        .light-mode {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-card: #f1f3f4;
            --text-primary: #1a1a2e;
            --text-secondary: #5f6368;
            --border: rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            transition: all 0.3s;
        }

        /* Mobile Header */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 1000;
        }

        .mobile-menu-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            height: 100vh;
            padding: 25px;
            position: fixed;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 999;
            transition: transform 0.3s;
        }

        .sidebar-header {
            margin-bottom: 30px;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--accent);
            color: white;
        }

        .nav-item i {
            width: 24px;
            text-align: center;
            font-size: 18px;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .credits-display {
            background: var(--accent-gradient);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            color: white;
            margin-bottom: 15px;
        }

        .credits-amount {
            font-size: 36px;
            font-weight: 800;
            margin: 10px 0;
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .auth-btn:hover {
            background: var(--accent);
            color: white;
        }

        /* Main Content */
        .main {
            margin-left: 260px;
            padding: 30px;
            width: calc(100% - 260px);
            min-height: 100vh;
        }

        /* Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-title h1 {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .page-title p {
            color: var(--text-secondary);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            border: none;
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }

        .icon-btn:hover {
            background: var(--accent);
            color: white;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .stat-icon.purple { background: rgba(99, 102, 241, 0.2); color: #6366f1; }
        .stat-icon.gold { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .stat-icon.green { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .stat-icon.blue { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }

        .stat-info h3 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .stat-info p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Generator Section */
        .generator-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .section-header h2 {
            font-size: 20px;
        }

        /* Mode Tabs */
        .mode-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .mode-tab {
            padding: 12px 24px;
            border-radius: 25px;
            border: 2px solid var(--border);
            background: transparent;
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .mode-tab.active {
            background: var(--accent-gradient);
            border-color: transparent;
            color: white;
        }

        /* Templates */
        .templates {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .template-btn {
            padding: 10px 18px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-secondary);
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .template-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Input Area */
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .prompt-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .prompt-input:focus {
            border-color: var(--accent);
        }

        .generate-btn {
            padding: 15px 30px;
            background: var(--accent-gradient);
            border: none;
            color: white;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .generate-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Result Area */
        .result-area {
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--border);
            border-radius: 16px;
            margin-top: 20px;
        }

        .result-area.has-content {
            border-style: solid;
            border-color: var(--border);
        }

        .result-placeholder {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px;
        }

        .result-placeholder i {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .result-image {
            max-width: 100%;
            max-height: 500px;
            border-radius: 12px;
        }

        .result-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }

        .action-btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* History Section */
        .history-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .section-title h2 {
            font-size: 20px;
        }

        .view-all {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .history-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .history-item:hover {
            transform: scale(1.05);
        }

        .history-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .history-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            opacity: 0;
            transition: opacity 0.2s;
        }

        .history-item:hover .history-overlay {
            opacity: 1;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        /* Loading */
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 15px 25px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 3000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success { border-color: #10b981; }
        .toast.error { border-color: #ef4444; }

        /* Responsive */
        @media (max-width: 768px) {
            .mobile-header {
                display: flex;
            }

            .sidebar {
                transform: translateX(-100%);
                width: 280px;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
                width: 100%;
                padding: 80px 15px 20px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .input-group {
                flex-direction: column;
            }

            .history-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Overlay for mobile */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 998;
        }

        .sidebar-overlay.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Mobile Header -->
    <div class="mobile-header">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">
            <i class="fas fa-bars"></i>
        </button>
        <div class="logo">
            <i class="fas fa-bolt"></i> KhanGPT
        </div>
        <button class="icon-btn" onclick="toggleTheme()">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>
    </div>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-bolt"></i> KhanGPT
            </div>
        </div>

        <nav>
            <a href="dashboard.html" class="nav-item active">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a href="index.html" class="nav-item">
                <i class="fas fa-comments"></i> AI Chat
            </a>
            <a href="gallery.html" class="nav-item">
                <i class="fas fa-images"></i> Gallery
            </a>
            <a href="trending.html" class="nav-item">
                <i class="fas fa-fire"></i> Trending
            </a>
            <a href="prompt-library.html" class="nav-item">
                <i class="fas fa-book"></i> Prompt Library
            </a>
            <a href="buy.html" class="nav-item">
                <i class="fas fa-coins"></i> Buy Credits
            </a>
            <a href="account.html" class="nav-item">
                <i class="fas fa-user"></i> Account
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="credits-display">
                <div style="font-size: 13px; opacity: 0.9;">Available Credits</div>
                <div class="credits-amount" id="creditsDisplay">0</div>
            </div>
            <button class="auth-btn" id="authBtn" onclick="handleAuth()">
                <i class="fas fa-sign-in-alt"></i> <span id="authText">Login</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <!-- Header -->
        <div class="page-header">
            <div class="page-title">
                <h1>Dashboard</h1>
                <p>Create amazing AI content</p>
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme">
                    <i class="fas fa-moon" id="desktopThemeIcon"></i>
                </button>
                <button class="icon-btn" onclick="refreshData()" title="Refresh">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon purple">
                    <i class="fas fa-image"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalImages">0</h3>
                    <p>Images Created</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon gold">
                    <i class="fas fa-coins"></i>
                </div>
                <div class="stat-info">
                    <h3 id="creditsCard">0</h3>
                    <p>Credits Left</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">
                    <i class="fas fa-video"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalVideos">0</h3>
                    <p>Videos Created</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon blue">
                    <i class="fas fa-comments"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalChats">0</h3>
                    <p>Chat Messages</p>
                </div>
            </div>
        </div>

        <!-- Generator -->
        <div class="generator-section">
            <div class="section-header">
                <i class="fas fa-wand-magic-sparkles" style="color: var(--gold);"></i>
                <h2>Quick Generate</h2>
            </div>

            <div
