<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhanGPT - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- CSS Styling (Modern & Clean) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f; --bg-secondary: #14141f; --bg-card: #1a1a2e;
            --text-primary: #ffffff; --text-secondary: #a0a0b0;
            --accent: #6366f1; --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gold: #f59e0b; --border: rgba(255,255,255,0.1);
        }
        .light-mode {
            --bg-primary: #f8f9fa; --bg-secondary: #ffffff; --bg-card: #f1f3f4;
            --text-primary: #1a1a2e; --text-secondary: #5f6368; --border: rgba(0,0,0,0.1);
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-primary); color: var(--text-primary); display: flex; transition: 0.3s; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--bg-secondary); height: 100vh; padding: 25px; position: fixed; border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 1000; transition: 0.3s; }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; margin-bottom: 5px; border-radius: 10px; color: var(--text-secondary); text-decoration: none; transition: 0.2s; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: var(--accent); color: white; }
        .credits-box { background: var(--accent-gradient); padding: 20px; border-radius: 15px; text-align: center; margin-top: auto; }

        /* Main Content */
        .main { margin-left: 260px; padding: 30px; width: calc(100% - 260px); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--bg-card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
        .stat-card h3 { font-size: 32px; color: var(--accent); margin-bottom: 5px; }

        /* Generator Area */
        .generator-box { background: var(--bg-card); padding: 30px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 30px; }
        .mode-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; border-radius: 20px; border: 1px solid var(--border); cursor: pointer; background: transparent; color: white; }
        .tab.active { background: var(--accent-gradient); border: none; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-primary); color: white; outline: none; }
        .gen-btn { padding: 15px 30px; border-radius: 12px; border: none; background: var(--accent-gradient); color: white; font-weight: bold; cursor: pointer; }

        /* Result Area */
        #resultArea { margin-top: 20px; min-height: 200px; border: 2px dashed var(--border); border-radius: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #resultArea img { max-width: 100%; border-radius: 15px; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main { margin-left: 0; width: 100%; }
            .sidebar.open { transform: translateX(0); }
        }
        
        .loading-spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body id="body">

    <aside class="sidebar" id="sidebar">
        <div class="logo">⚡ KhanGPT</div>
        <nav>
            <a href="dashboard.html" class="nav-item active"><i class="fas fa-home"></i> Dashboard</a>
            <a href="index.html" class="nav-item"><i class="fas fa-comments"></i> AI Chat</a>
            <a href="account.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
            <a href="buy.html" class="nav-item"><i class="fas fa-coins"></i> Buy Credits</a>
        </nav>
        <div class="credits-box">
            <p>Credits Available</p>
            <h2 id="sidebarCredits">0</h2>
        </div>
        <button class="nav-item" style="margin-top: 15px; background: #ef4444; color: white; border: none; width: 100%;" onclick="auth.signOut()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </aside>

    <main class="main">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1>Dashboard</h1>
            <button onclick="toggleTheme()" style="background: var(--bg-card); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 10px; cursor: pointer;"><i class="fas fa-moon"></i></button>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><h3 id="statImages">0</h3><p>Images Created</p></div>
            <div class="stat-card"><h3 id="statCredits">0</h3><p>Credits Left</p></div>
            <div class="stat-card"><h3 id="statChats">0</h3><p>Total Chats</p></div>
        </div>

        <div class="generator-box">
            <div class="mode-tabs">
                <button class="tab active" onclick="setMode('image', this)">Image</button>
                <button class="tab" onclick="setMode('chat', this)">Chat</button>
            </div>
            <div class="input-group">
                <input type="text" id="promptInput" placeholder="Describe what you want to create...">
                <button class="gen-btn" id="genBtn" onclick="handleGenerate()">Generate</button>
            </div>
        </div>

        <div id="resultArea">
            <p style="color: var(--text-secondary);">Your AI creation will appear here...</p>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        // 1. Firebase Init
        const firebaseConfig = {
            apiKey: "AIzaSyDLvIHX6lGZGC7YViPH5Pf3Sc9AV7-BcM4",
            authDomain: "khangpt-4176b.firebaseapp.com",
            projectId: "khangpt-4176b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentMode = 'image';
        let userCredits = 0;

        // 2. Auth State & Sync
        auth.onAuthStateChanged(user => {
            if (user) {
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        userCredits = data.credits || 0;
                        document.getElementById('sidebarCredits').textContent = userCredits;
                        document.getElementById('statCredits').textContent = userCredits;
                        document.getElementById('statImages').textContent = data.imagesGenerated || 0;
                        document.getElementById('statChats').textContent = data.chatsGenerated || 0;
                    }
                });
            } else {
                window.location.href = "index.html";
            }
        });

        // 3. Mode Switcher
        function setMode(mode, el) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('promptInput').placeholder = mode === 'image' ? "Describe image..." : "Ask AI anything...";
        }

        // 4. GENERATE LOGIC (Final Fix)
        async function handleGenerate() {
            const input = document.getElementById('promptInput');
            const prompt = input.value.trim();
            const resultArea = document.getElementById('resultArea');
            const btn = document.getElementById('genBtn');

            if (!prompt) return alert("Please enter a prompt!");
            if (userCredits <= 0) return alert("No credits left!");

            btn.disabled = true;
            resultArea.innerHTML = `<div class="loading-spinner"></div>`;

            try {
                const endpoint = currentMode === 'image' ? '/api/generate-image' : '/api/chat';
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error);

                if (currentMode === 'image') {
                    resultArea.innerHTML = `<img src="${data.url}" alt="AI Art">`;
                    updateStats('imagesGenerated');
                } else {
                    resultArea.innerHTML = `<div style="padding: 20px;">${data.text}</div>`;
                    updateStats('chatsGenerated');
                }

            } catch (e) {
                alert("Error: " + e.message);
                resultArea.innerHTML = `<p>Generation failed. Try again.</p>`;
            } finally {
                btn.disabled = false;
            }
        }

        async function updateStats(field) {
            const user = auth.currentUser;
            await db.collection('users').doc(user.uid).update({
                credits: firebase.firestore.FieldValue.increment(-1),
                [field]: firebase.firestore.FieldValue.increment(1)
            });
        }

        function toggleTheme() { document.body.classList.toggle('light-mode'); }
    </script>
</body>
</html>
