<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhanGPT - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS Same Rakha Hai Taaki Theme Match Kare */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f; --bg-secondary: #14141f; --bg-card: #1a1a2e;
            --text-primary: #ffffff; --text-secondary: #a0a0b0;
            --accent: #6366f1; --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --border: rgba(255,255,255,0.1);
        }
        body { font-family: sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .header { position: fixed; top: 0; width: 100%; height: 65px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .main { margin-top: 80px; padding: 20px; max-width: 1000px; margin-left: auto; margin-right: auto; }
        
        /* Admin Stats Table */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-box { background: var(--bg-card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .stat-box h2 { color: var(--accent); font-size: 32px; }

        .user-list { background: var(--bg-card); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); }
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); }
        .user-info h4 { font-size: 15px; margin-bottom: 4px; }
        .user-info p { font-size: 12px; color: var(--text-secondary); }

        .admin-btns { display: flex; gap: 8px; }
        .btn-add { background: var(--accent-gradient); color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .btn-reset { background: #ef4444; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; display: none; z-index: 2000; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">👑 KhanGPT Admin</div>
        <button class="login-btn" onclick="location.href='index.html'">Back to Home</button>
    </div>

    <div class="main">
        <div class="stats-grid">
            <div class="stat-box"><h2 id="totalUsers">0</h2><p>Total Users</p></div>
            <div class="stat-box"><h2 id="systemCredits">0</h2><p>Total Credits Out</p></div>
        </div>

        <h3 style="margin-bottom: 15px;">User Management</h3>
        <div class="user-list" id="userContainer">
            <p style="padding: 20px; text-align: center;">Loading users data...</p>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLvIHX6lGZGC7YViPH5Pf3Sc9AV7-BcM4",
            authDomain: "khangpt-4176b.firebaseapp.com",
            projectId: "khangpt-4176b"
        };

        // 🔐 APNA ADMIN EMAIL YAHAN LIKHEIN
        const ADMIN_EMAIL = "your-email@gmail.com"; 

        let auth, db;

        window.onload = function() {
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();

            auth.onAuthStateChanged(user => {
                if (user && user.email === ADMIN_EMAIL) {
                    loadAllUsers();
                } else {
                    alert("Unauthorized Access! Only Admin allowed.");
                    window.location.href = 'index.html';
                }
            });
        };

        async function loadAllUsers() {
            const container = document.getElementById('userContainer');
            const snapshot = await db.collection('users').get();
            
            container.innerHTML = "";
            let totalCredits = 0;
            document.getElementById('totalUsers').textContent = snapshot.size;

            snapshot.forEach(doc => {
                const data = doc.data();
                totalCredits += (data.credits || 0);

                const item = document.createElement('div');
                item.className = 'user-item';
                item.innerHTML = `
                    <div class="user-info">
                        <h4>${data.email || 'Anonymous'}</h4>
                        <p>Credits: <b>${data.credits || 0}</b> | Images: ${data.imagesGenerated || 0}</p>
                    </div>
                    <div class="admin-btns">
                        <button class="btn-add" onclick="updateCredits('${doc.id}', 50)">+50</button>
                        <button class="btn-reset" onclick="updateCredits('${doc.id}', -doc.data().credits)">Reset</button>
                    </div>
                `;
                container.appendChild(item);
            });
            document.getElementById('systemCredits').textContent = totalCredits;
        }

        async function updateCredits(uid, amount) {
            try {
                if (amount < 0) {
                    // Reset to 0
                    await db.collection('users').doc(uid).update({ credits: 0 });
                } else {
                    // Increment
                    await db.collection('users').doc(uid).update({
                        credits: firebase.firestore.FieldValue.increment(amount)
                    });
                }
                showToast("User updated successfully!");
                loadAllUsers(); // Refresh list
            } catch (e) {
                showToast("Error: " + e.message);
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
