<!DOCTYPE html>
<html>
<head>

<title>Admin Panel</title>

<style>

body{
background:#0f0c29;
color:white;
font-family:Arial;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:20px;
justify-content:center;
margin-top:30px;
}

.card{
background:#1b1738;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>Admin Dashboard</h1>

<div class="grid">

<div class="card">
<p>Total Users</p>
<h2 id="users">0</h2>
</div>

<div class="card">
<p>Total Images</p>
<h2 id="images">0</h2>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey:"AIzaSyDLvIHX6lGZGC7YViPH5Pf3Sc9AV7-BcM4",
authDomain:"khangpt-4176b.firebaseapp.com",
projectId:"khangpt-4176b"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();

loadStats();

async function loadStats(){

const users=await db.collection("users").get();

document.getElementById("users").innerText=
users.size;

const images=await db.collectionGroup("images").get();

document.getElementById("images").innerText=
images.size;

}

</script>

</body>
</html>
