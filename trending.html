<!DOCTYPE html>
<html>
<head>

<title>Trending AI Images</title>

<style>

body{
background:#0f0c29;
color:white;
font-family:Arial;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:20px;
justify-content:center;
margin-top:30px;
}

.card{
background:#1b1738;
padding:10px;
border-radius:10px;
}

img{
width:200px;
border-radius:10px;
}

.likes{
font-size:13px;
margin-top:5px;
color:gold;
}

.prompt{
font-size:11px;
opacity:.7;
margin-top:5px;
}

</style>

</head>

<body>

<h1>🔥 Trending AI Images</h1>

<div id="gallery" class="grid"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey:"AIzaSyDLvIHX6lGZGC7YViPH5Pf3Sc9AV7-BcM4",
authDomain:"khangpt-4176b.firebaseapp.com",
projectId:"khangpt-4176b"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

loadTrending();

async function loadTrending(){

try{

const snap = await db.collectionGroup("images")
.orderBy("likes","desc")
.limit(20)
.get();

const gallery = document.getElementById("gallery");

gallery.innerHTML="";

snap.forEach(doc=>{

const data = doc.data();

gallery.innerHTML +=

'<div class="card">'+
'<img src="'+data.imageUrl+'">'+
'<div class="likes">🔥 '+(data.likes || 0)+' Likes</div>'+
'<div class="prompt">'+(data.prompt || "")+'</div>'+
'</div>';

});

}catch(e){

document.getElementById("gallery").innerHTML="Error loading trending images";

}

}

</script>

</body>
</html>
