<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending - KhanGPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #14141f;
            --bg-card: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #6366f1;
            --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gold: #f59e0b;
            --hot: #ef4444;
            --border: rgba(255,255,255,0.1);
        }

        .light-mode {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-card: #f1f3f4;
            --text-primary: #1a1a2e;
            --text-secondary: #5f6368;
            --border: rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            border: none;
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }

        .icon-btn:hover {
            background: var(--accent);
            color: white;
        }

        /* Main */
        .main {
            margin-top: 70px;
            padding: 30px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 40px 20px;
            margin-bottom: 30px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #f59e0b, #ef4444, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Time Filters */
        .time-filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 30px;
            border: 2px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--accent-gradient);
            border-color: transparent;
            color: white;
            transform: scale(1.05);
        }

        .filter-btn i {
            font-size: 16px;
        }

        /* Top Creators */
        .creators-section {
            margin-bottom: 50px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .creators-row {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 15px;
        }

        .creator-card {
            flex-shrink: 0;
            width: 150px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s;
        }

        .creator-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
        }

        .creator-rank {
            width: 35px;
            height: 35px;
            background: var(--gold);
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            margin: 0 auto 15px;
        }

        .creator-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid var(--gold);
        }

        .creator-name {
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .creator-stats {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* Hashtag Trends */
        .hashtags {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 40px;
            justify-content: center;
        }

        .hashtag {
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .hashtag:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .hashtag i {
            color: var(--gold);
        }

        .hashtag-count {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .hashtag:hover .hashtag-count {
            color: rgba(255,255,255,0.8);
        }

        /* Gallery Grid */
        .gallery-section {
            margin-bottom: 30px;
        }

        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .trending-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            position: relative;
        }

        .trending-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border-color: var(--accent);
        }

        .trending-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--hot);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 10;
        }

        .trending-badge.top3 {
            background: var(--gold);
            color: black;
        }

        .trending-image {
            width: 100%;
            height: 350px;
            object-fit: cover;
            display: block;
        }

        .trending-info {
            padding: 20px;
        }

        .trending-prompt {
            font-size: 15px;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
        }

        .trending-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .trending-author {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .author-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
        }

        .author-name {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .trending-rank {
            font-size: 24px;
            font-weight: 800;
            color: var(--gold);
        }

        .trending-stats {
            display: flex;
            gap: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .stat i {
            color: var(--accent);
        }

        .trending-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .action-btn.liked {
            background: var(--hot);
            color: white;
            border-color: var(--hot);
        }

        .action-btn.liked i {
            animation: heartbeat 0.3s;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        /* Load More */
        .load-more {
            text-align: center;
            padding: 50px;
        }

        .load-more-btn {
            padding: 18px 50px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .load-more-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 100px 20px;
        }

        .empty-state i {
            font-size: 80px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 3000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success { border-color: #10b981; }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 36px;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
            }

            .trending-image {
                height: 400px;
            }

            .creators-row {
                gap: 15px;
            }

            .creator-card {
                width: 130px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="dashboard.html" class="icon-btn">
            <i class="fas fa-arrow-left"></i>
        </a>
        
        <div class="logo">
            <i class="fas fa-fire"></i> Trending
        </div>
        
        <div class="header-actions">
            <button class="icon-btn" onclick="toggleTheme()">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
        </div>
    </header>

    <!-- Main -->
    <main class="main">
        <!-- Hero -->
        <div class="hero">
            <h1>🔥 Trending Now</h1>
            <p>Discover the most popular AI creations from our community this week</p>
        </div>

        <!-- Time Filters -->
        <div class="time-filters">
            <button class="filter-btn active" onclick="setFilter('daily', this)">
                <i class="fas fa-sun"></i> Today
            </button>
            <button class="filter-btn" onclick="setFilter('weekly', this)">
                <i class="fas fa-calendar-week"></i> This Week
            </button>
            <button class="filter-btn" onclick="setFilter('monthly', this)">
                <i class="fas fa-calendar-alt"></i> This Month
            </button>
            <button class="filter-btn" onclick="setFilter('alltime', this)">
                <i class="fas fa-trophy"></i> All Time
            </button>
        </div>

        <!-- Top Creators -->
        <div class="creators-section">
            <h2 class="section-title">
                <i class="fas fa-crown" style="color: var(--gold);"></i> Top Creators
            </h2>
            <div class="creators-row" id="creatorsRow">
                <!-- Dynamic -->
            </div>
        </div>

        <!-- Trending Hashtags -->
        <div class="hashtags" id="hashtags">
            <div class="hashtag" onclick="filterByTag('anime')">
                <i class="fas fa-hashtag"></i> anime <span class="hashtag-count">2.4k</span>
            </div>
            <div class="hashtag" onclick="filterByTag('cyberpunk')">
                <i class="fas fa-hashtag"></i> cyberpunk <span class="hashtag-count">1.8k</span>
            </div>
            <div class="hashtag" onclick="filterByTag('portrait')">
                <i class="fas fa-hashtag"></i> portrait <span class="hashtag-count">1.5k</span>
            </div>
            <div class="hashtag" onclick="filterByTag('nature')">
                <i class="fas fa-hashtag"></i> nature <span class="hashtag-count">1.2k</span>
            </div>
            <div class="hashtag" onclick="filterByTag('islamic')">
                <i class="fas fa-hashtag"></i> islamic <span class="hashtag-count">980</span>
            </div>
            <div class="hashtag" onclick="filterByTag('futuristic')">
                <i class="fas fa-hashtag"></i> futuristic <span class="hashtag-count">856</span>
            </div>
        </div>

        <!-- Gallery -->
        <div class="gallery-section">
            <div class="gallery-header">
                <h2 class="section-title">
                    <i class="fas fa-chart-line" style="color: var(--accent);"></i> Top Creations
                </h2>
            </div>
            
            <div class="gallery-grid" id="gallery">
                <div class="empty-state">
                    <i class="fas fa-fire"></i>
                    <h3>Loading trending...</h3>
                </div>
            </div>
        </div>

        <!-- Load More -->
        <div class="load-more">
            <button class="load-more-btn" onclick="loadMore()">
                Load More <i class="fas fa-chevron-down"></i>
            </button>
        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Success!</span>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDLvIHX6lGZGC7YViPH5Pf3Sc9AV7-BcM4",
            authDomain: "khangpt-4176b.firebaseapp.com",
            projectId: "khangpt-4176b"
        };

        // State
        let app, auth, db;
        let currentFilter = 'daily';
        let allItems = [];
        let displayedCount = 0;
        const ITEMS_PER_PAGE = 12;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            app = firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();

            loadTrending();
            loadTopCreators();
            loadTheme();
        });

        async function loadTrending() {
            try {
                // Calculate time range based on filter
                let startTime = new Date();
                if (currentFilter === 'daily') startTime.setDate(startTime.getDate() - 1);
                else if (currentFilter === 'weekly') startTime.setDate(startTime.getDate() - 7);
                else if (currentFilter === 'monthly') startTime.setMonth(startTime.getMonth() - 1);
                else startTime = new Date(0); // all time

                const snap = await db.collectionGroup('creations')
                    .where('createdAt', '>=', startTime)
                    .orderBy('createdAt', 'desc')
                    .limit(50)
                    .get();

                allItems = [];
                snap.forEach(doc => {
                    const data = doc.data();
                    data.id = doc.id;
                    // Calculate trending score: likes * 2 + views * 0.5
                    data.trendingScore = (data.likes || 0) * 2 + (data.views || 0) * 0.5;
                    allItems.push(data);
                });

                // Sort by trending score
                allItems.sort((a, b) => b.trendingScore - a.trendingScore);

                displayedCount = Math.min(ITEMS_PER_PAGE, allItems.length);
                renderGallery();

            } catch (e) {
                console.error(e);
                document.getElementById('gallery').innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-exclamation-circle"></i>
                        <h3>Error loading trending</h3>
