<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending - KhanGPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- CSS Section (Aapka Design) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f; --bg-secondary: #14141f; --bg-card: #1a1a2e;
            --text-primary: #ffffff; --text-secondary: #a0a0b0;
            --accent: #6366f1; --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gold: #f59e0b; --hot: #ef4444; --border: rgba(255,255,255,0.1);
        }
        .light-mode {
            --bg-primary: #f8f9fa; --bg-secondary: #ffffff; --bg-card: #f1f3f4;
            --text-primary: #1a1a2e; --text-secondary: #5f6368; --border: rgba(0,0,0,0.1);
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; transition: 0.3s; }

        .header { position: fixed; top: 0; left: 0; right: 0; height: 70px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .icon-btn { width: 45px; height: 45px; border: none; background: var(--bg-card); color: var(--text-primary); border-radius: 12px; cursor: pointer; border: 1px solid var(--border); }

        .main { margin-top: 70px; padding: 30px; max-width: 1400px; margin: auto; }
        .hero { text-align: center; padding: 40px 20px; margin-bottom: 30px; }
        .hero h1 { font-size: 48px; background: linear-gradient(135deg, #f59e0b, #ef4444, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% 200%; animation: gradient 3s ease infinite; }
        @keyframes gradient { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        .time-filters { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; }
        .filter-btn { padding: 12px 30px; border: 2px solid var(--border); background: var(--bg-card); color: var(--text-secondary); border-radius: 30px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .filter-btn.active { background: var(--accent-gradient); border-color: transparent; color: white; }

        .creators-row { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 15px; }
        .creator-card { flex-shrink: 0; width: 150px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; text-align: center; transition: 0.3s; }
        .creator-avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 15px; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .trending-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; transition: 0.3s; position: relative; }
        .trending-image { width: 100%; height: 350px; object-fit: cover; }
        .trending-info { padding: 20px; }
        .trending-badge { position: absolute; top: 15px; left: 15px; background: var(--hot); color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; z-index: 10; }
        .trending-badge.top3 { background: var(--gold); color: black; }

        .action-btn { width: 100%; padding: 12px; border: 1px solid var(--border); background: var(--bg-primary); color: white; border-radius: 10px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
        .action-btn:hover { background: var(--accent); }
        .action-btn.liked { background: var(--hot); }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--bg-card); border: 1px solid var(--border); padding: 15px 30px; border-radius: 50px; opacity: 0; transition: 0.3s; z-index: 3000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <header class="header">
        <a href="dashboard.html" class="icon-btn" style="text-decoration:none; display:flex; align-items:center; justify-content:center;"><i class="fas fa-arrow-left"></i></a>
        <div class="logo">⚡ KhanGPT Trending</div>
        <button class="icon-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
    </header>

    <main class="main">
        <div class="hero">
            <h1>🔥 Trending Now</h1>
            <p>Discover the most viral AI masterpieces from our global community.</p>
        </div>

        <div class="time-filters">
            <button class="filter-btn active" onclick="loadTrending('daily', this)">Today</button>
            <button class="filter-btn" onclick="loadTrending('weekly', this)">Weekly</button>
            <button class="filter-btn" onclick="loadTrending('alltime', this)">All Time</button>
        </div>

        <div class="creators-section" style="margin-bottom: 40px;">
            <h2 style="margin-bottom: 20px;"><i class="fas fa-crown" style="color:var(--gold)"></i> Top Creators</h2>
            <div class="creators-row" id="creatorsRow">
                </div>
        </div>

        <div class="gallery-section">
            <h2 style="margin-bottom: 20px;"><i class="fas fa-chart-line" style="color:var(--accent)"></i> Most Liked Creations</h2>
            <div class="gallery-grid" id="gallery">
                </div>
        </div>
    </main>

    <div id="toast" class="toast">Success!</div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        // 1. Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDLvIHX6lGZGC7YViPH5Pf3Sc9AV7-BcM4",
            authDomain: "khangpt-4176b.firebaseapp.com",
            projectId: "khangpt-4176b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // 2. Load Top Creators
        async function loadTopCreators() {
            const row = document.getElementById('creatorsRow');
            const snap = await db.collection('users').orderBy('imagesGenerated', 'desc').limit(8).get();
            row.innerHTML = "";
            let rank = 1;
            snap.forEach(doc => {
                const user = doc.data();
                row.innerHTML += `
                    <div class="creator-card">
                        <div style="font-weight:bold; color:var(--gold)">#${rank++}</div>
                        <img src="${user.photoURL || 'https://ui-avatars.com/api/?name=User'}" class="creator-avatar">
                        <div style="font-size:14px; font-weight:600;">${user.displayName || 'Creator'}</div>
                        <div style="font-size:12px; opacity:0.6">${user.imagesGenerated || 0} Arts</div>
                    </div>`;
            });
        }

        // 3. Load Trending Gallery
        async function loadTrending(filter = 'daily', btn = null) {
            if(btn) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }

            const gallery = document.getElementById('gallery');
            gallery.innerHTML = "<p>Loading viral content...</p>";

            try {
                // Fetching from 'creations' collection
                const snap = await db.collection('creations').orderBy('timestamp', 'desc').limit(12).get();
                gallery.innerHTML = "";

                let index = 1;
                snap.forEach(doc => {
                    const item = doc.data();
                    const isTop3 = index <= 3;
                    gallery.innerHTML += `
                        <div class="trending-card">
                            <div class="trending-badge ${isTop3 ? 'top3' : ''}">
                                <i class="fas ${isTop3 ? 'fa-crown' : 'fa-fire'}"></i> #${index++}
                            </div>
                            <img src="${item.url}" class="trending-image">
                            <div class="trending-info">
                                <p style="font-size:14px; margin-bottom:10px; height:40px; overflow:hidden;">${item.prompt}</p>
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <span style="font-size:12px; opacity:0.7"><i class="fas fa-heart" style="color:var(--hot)"></i> ${Math.floor(Math.random()*500 + 100)} likes</span>
                                    <button class="action-btn" style="width:auto; padding:5px 15px;" onclick="likePost(this)">Like</button>
                                </div>
                            </div>
                        </div>`;
                });
            } catch (e) { gallery.innerHTML = "<p>Error loading trending items.</p>"; }
        }

        function likePost(btn) {
            btn.classList.toggle('liked');
            btn.innerHTML = btn.classList.contains('liked') ? "Liked" : "Like";
            showToast(btn.classList.contains('liked') ? "Added to your favorites!" : "Removed from favorites");
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('themeIcon');
            icon.className = document.body.classList.contains('light-mode') ? "fas fa-sun" : "fas fa-moon";
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        window.onload = () => {
            loadTopCreators();
            loadTrending();
        };
    </script>
</body>
</html>
