<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Credits - KhanGPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        /* Maine aapka CSS yahan waise hi rakha hai (Shortened for response) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-primary: #0a0a0f; --bg-secondary: #14141f; --bg-card: #1a1a2e; --text-primary: #ffffff; --text-secondary: #a0a0b0; --accent: #6366f1; --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6); --gold: #f59e0b; --success: #10b981; --border: rgba(255,255,255,0.1); }
        body { font-family: sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .header { position: fixed; top: 0; width: 100%; height: 70px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; z-index: 1000; }
        .main { margin-top: 70px; padding: 40px 20px; max-width: 1200px; margin: auto; }
        .hero { text-align: center; margin-bottom: 50px; }
        .current-credits { display: inline-flex; align-items: center; gap: 10px; background: var(--bg-card); padding: 15px 30px; border-radius: 50px; border: 1px solid var(--border); }
        .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .pricing-card { background: var(--bg-card); border-radius: 24px; padding: 40px 30px; text-align: center; border: 2px solid var(--border); transition: 0.3s; }
        .pricing-card.popular { border-color: var(--gold); transform: scale(1.05); }
        .buy-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent-gradient); color: white; font-weight: 700; cursor: pointer; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 15px 30px; border-radius: 50px; display: none; z-index: 3000; }
        .history-section { background: var(--bg-card); border-radius: 20px; padding: 30px; margin-top: 50px; }
        .transaction-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" style="color:white; text-decoration:none;"><i class="fas fa-arrow-left"></i> Back</a>
        <div style="font-size:20px; font-weight:800;">⚡ KhanGPT Credits</div>
        <div></div>
    </header>

    <main class="main">
        <div class="hero">
            <h1>Get More Credits</h1>
            <div class="current-credits">
                <i class="fas fa-coins" style="color:var(--gold)"></i>
                <span id="userCreditsDisplay" style="font-size:24px; font-weight:bold;">0</span> Credits Available
            </div>
        </div>

        <div class="pricing-grid">
            <div class="pricing-card">
                <h3>Starter</h3>
                <div style="font-size:40px; margin:20px 0;">20 Credits</div>
                <div style="font-size:24px; color:var(--gold);">₹20</div>
                <button class="buy-btn" onclick="payWithRazorpay(20, 20)">Buy Now</button>
            </div>
            <div class="pricing-card popular">
                <h3>Pro</h3>
                <div style="font-size:40px; margin:20px 0;">100 Credits</div>
                <div style="font-size:24px; color:var(--gold);">₹80</div>
                <button class="buy-btn" onclick="payWithRazorpay(80, 100)">Buy Now</button>
            </div>
            <div class="pricing-card">
                <h3>Unlimited</h3>
                <div style="font-size:40px; margin:20px 0;">500 Credits</div>
                <div style="font-size:24px; color:var(--gold);">₹350</div>
                <button class="buy-btn" onclick="payWithRazorpay(350, 500)">Buy Now</button>
            </div>
        </div>

        <div class="history-section">
            <h3><i class="fas fa-history"></i> Recent Transactions</h3>
            <div id="transactionHistory">
                <p style="text-align:center; padding:20px; opacity:0.5;">No history found</p>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLvIHX6lGZGC7YViPH5Pf3Sc9AV7-BcM4",
            authDomain: "khangpt-4176b.firebaseapp.com",
            projectId: "khangpt-4176b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;

        // 1. Auth Status & Credits Loading
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                loadUserCredits();
                loadTransactionHistory();
            } else {
                window.location.href = "index.html";
            }
        });

        async function loadUserCredits() {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if (doc.exists) {
                document.getElementById('userCreditsDisplay').textContent = doc.data().credits || 0;
            }
        }

        async function loadTransactionHistory() {
            const container = document.getElementById('transactionHistory');
            const snapshot = await db.collection('transactions')
                                    .where('userId', '==', currentUser.uid)
                                    .orderBy('timestamp', 'desc').limit(5).get();
            
            if (!snapshot.empty) {
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const t = doc.data();
                    container.innerHTML += `
                        <div class="transaction-item">
                            <div><b>${t.credits} Credits</b><br><small>${new Date(t.timestamp?.toDate()).toLocaleDateString()}</small></div>
                            <div style="color:var(--success)">₹${t.amount} ✅</div>
                        </div>`;
                });
            }
        }

        // 2. Razorpay Logic
        function payWithRazorpay(amount, credits) {
            const options = {
                "key": "YOUR_RAZORPAY_KEY_ID", // 👈 Yahan apni Razorpay Key dalein
                "amount": amount * 100, 
                "currency": "INR",
                "name": "KhanGPT AI",
                "description": `Buying ${credits} Credits`,
                "handler": function (response) {
                    saveTransaction(response.razorpay_payment_id, amount, credits);
                },
                "prefill": {
                    "email": currentUser.email
                },
                "theme": { "color": "#6366f1" }
            };
            const rzp = new Razorpay(options);
            rzp.open();
        }

        // 3. Save to Firebase
        async function saveTransaction(payId, amt, creds) {
            try {
                // Credits badhayein
                await db.collection('users').doc(currentUser.uid).update({
                    credits: firebase.firestore.FieldValue.increment(creds)
                });

                // Record save karein
                await db.collection('transactions').add({
                    userId: currentUser.uid,
                    paymentId: payId,
                    amount: amt,
                    credits: creds,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                showToast(`Success! ${creds} Credits added.`);
                loadUserCredits();
                loadTransactionHistory();
            } catch (e) {
                showToast("Error updating credits!");
            }
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.textContent = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
