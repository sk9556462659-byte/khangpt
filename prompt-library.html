<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Library - KhanGPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- CSS Section (Aapka Design + Fixes) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f; --bg-secondary: #14141f; --bg-card: #1a1a2e;
            --text-primary: #ffffff; --text-secondary: #a0a0b0;
            --accent: #6366f1; --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gold: #f59e0b; --success: #10b981; --border: rgba(255,255,255,0.1);
        }
        .light-mode {
            --bg-primary: #f8f9fa; --bg-secondary: #ffffff; --bg-card: #f1f3f4;
            --text-primary: #1a1a2e; --text-secondary: #5f6368; --border: rgba(0,0,0,0.1);
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; transition: 0.3s; }

        .header { position: fixed; top: 0; left: 0; right: 0; height: 70px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .icon-btn { width: 45px; height: 45px; border: none; background: var(--bg-card); color: var(--text-primary); border-radius: 12px; cursor: pointer; border: 1px solid var(--border); }

        .main { margin-top: 70px; padding: 40px 20px; max-width: 1400px; margin: auto; }
        .hero { text-align: center; padding: 40px 20px; margin-bottom: 40px; }
        .hero h1 { font-size: 42px; margin-bottom: 15px; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-container { max-width: 600px; margin: 0 auto 40px; position: relative; }
        .search-input { width: 100%; padding: 20px 25px 20px 60px; border: 2px solid var(--border); background: var(--bg-card); color: var(--text-primary); border-radius: 50px; outline: none; }
        .search-icon { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }

        .categories { display: flex; gap: 12px; margin-bottom: 40px; overflow-x: auto; padding-bottom: 10px; justify-content: center; flex-wrap: wrap; }
        .category-btn { padding: 12px 24px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary); border-radius: 30px; cursor: pointer; transition: 0.2s; }
        .category-btn.active { background: var(--accent); color: white; }

        .prompts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; margin-bottom: 50px; }
        .prompt-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; transition: 0.3s; }
        .prompt-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .prompt-preview { height: 180px; background: linear-gradient(135deg, #1a1a2e, #2d2d44); display: flex; align-items: center; justify-content: center; position: relative; }
        .prompt-preview i { font-size: 50px; color: var(--accent); opacity: 0.6; }
        .prompt-category { position: absolute; top: 15px; left: 15px; padding: 6px 12px; background: rgba(0,0,0,0.6); border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .prompt-content { padding: 20px; }
        .prompt-text { color: var(--text-secondary); font-size: 14px; margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; height: 65px; }
        .prompt-actions { display: flex; gap: 10px; }
        .action-btn { flex: 1; padding: 12px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .action-btn:hover { background: var(--accent); color: white; }

        .submit-section { background: var(--accent-gradient); border-radius: 24px; padding: 50px; text-align: center; margin-top: 50px; }
        .submit-btn { padding: 18px 40px; background: white; color: var(--accent); border: none; border-radius: 50px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 20px; }

        /* Modal & Toast */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); border-radius: 24px; padding: 30px; max-width: 500px; width: 100%; }
        .form-input, .form-textarea { width: 100%; padding: 15px; margin-top: 10px; margin-bottom: 20px; border: 1px solid var(--border); background: var(--bg-primary); color: white; border-radius: 12px; outline: none; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--bg-card); border: 1px solid var(--border); padding: 15px 30px; border-radius: 50px; opacity: 0; transition: 0.3s; z-index: 3000; display: flex; align-items: center; gap: 10px; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { border-color: var(--success); }
    </style>
</head>
<body>

    <header class="header">
        <a href="dashboard.html" class="icon-btn" style="text-decoration:none; display:flex; align-items:center; justify-content:center;"><i class="fas fa-arrow-left"></i></a>
        <div class="logo">⚡ KhanGPT Library</div>
        <button class="icon-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
    </header>

    <main class="main">
        <div class="hero">
            <h1>🎨 AI Prompt Library</h1>
            <p>Discover and copy professional prompts to create stunning AI art.</p>
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="Search prompts..." onkeyup="searchPrompts()">
            </div>
        </div>

        <div class="categories" id="categoryContainer">
            <button class="category-btn active" onclick="filterCategory('all', this)">All</button>
            <button class="category-btn" onclick="filterCategory('anime', this)">Anime</button>
            <button class="category-btn" onclick="filterCategory('portrait', this)">Portrait</button>
            <button class="category-btn" onclick="filterCategory('nature', this)">Nature</button>
            <button class="category-btn" onclick="filterCategory('islamic', this)">Islamic</button>
            <button class="category-btn" onclick="filterCategory('cyberpunk', this)">Cyberpunk</button>
        </div>

        <div class="prompts-grid" id="promptsGrid">
            </div>

        <div class="submit-section">
            <h2>💡 Have a Great Prompt?</h2>
            <p>Share your creative prompts with the community!</p>
            <button class="submit-btn" onclick="openSubmitModal()"><i class="fas fa-plus-circle"></i> Submit Prompt</button>
        </div>
    </main>

    <div class="modal" id="submitModal">
        <div class="modal-content">
            <h3>Submit New Prompt</h3>
            <form onsubmit="handlePromptSubmit(event)">
                <input type="text" class="form-input" id="mTitle" placeholder="Title" required>
                <textarea class="form-textarea" id="mText" placeholder="Detailed Prompt..." required></textarea>
                <button type="submit" class="action-btn" style="background:var(--accent); color:white; width:100%;">Send for Review</button>
                <button type="button" class="action-btn" style="margin-top:10px; width:100%;" onclick="closeSubmitModal()">Cancel</button>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"><i class="fas fa-check-circle" style="color:var(--success)"></i> <span id="toastMsg">Success</span></div>

    <script>
        const prompts = [
            { id: 1, title: "3D Pixar Style Character", text: "Cute 3D Pixar style character, big expressive eyes, soft lighting, 8k render, octane render, vivid colors", category: "cartoon", icon: "fa-smile-beam" },
            { id: 2, title: "Islamic Golden Mosque", text: "Golden mosque at sunset, divine glowing light, intricate arabesque patterns, 8k resolution, realistic photography", category: "islamic", icon: "fa-mosque" },
            { id: 3, title: "Anime Girl in Rain", text: "Studio Ghibli style, anime girl standing in rain, neon city lights reflection, cinematic lighting, 4k masterpiece", category: "anime", icon: "fa-dragon" },
            { id: 4, title: "Cyberpunk City Skyline", text: "Futuristic city night, flying cars, neon purple and blue lights, blade runner aesthetic, ultra detailed, 8k", category: "cyberpunk", icon: "fa-city" },
            { id: 5, title: "Majestic Snow Mountain", text: "Snow capped peaks, reflection in crystal lake, morning fog, nature photography, ultra realistic, high dynamic range", category: "nature", icon: "fa-mountain" },
            { id: 6, title: "Warrior Portrait", text: "Close up portrait of an ancient warrior, dramatic lighting, battle scars, highly detailed armor, cinematic 8k", category: "portrait", icon: "fa-user-shield" }
        ];

        function displayPrompts(data = prompts) {
            const grid = document.getElementById('promptsGrid');
            grid.innerHTML = "";
            data.forEach(p => {
                grid.innerHTML += `
                    <div class="prompt-card">
                        <div class="prompt-preview">
                            <i class="fas ${p.icon}"></i>
                            <span class="prompt-category">${p.category}</span>
                        </div>
                        <div class="prompt-content">
                            <h3 class="prompt-title">${p.title}</h3>
                            <p class="prompt-text" id="p-${p.id}">${p.text}</p>
                            <div class="prompt-actions">
                                <button class="action-btn" onclick="copyPrompt('${p.id}', this)"><i class="fas fa-copy"></i> Copy</button>
                                <button class="action-btn" onclick="tryNow('${encodeURIComponent(p.text)}')"><i class="fas fa-wand-magic-sparkles"></i> Try</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function copyPrompt(id, btn) {
            const text = document.getElementById(`p-${id}`).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const oldText = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-check"></i> Done`;
                showToast("Prompt copied to clipboard!");
                setTimeout(() => btn.innerHTML = oldText, 2000);
            });
        }

        function searchPrompts() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = prompts.filter(p => p.title.toLowerCase().includes(q) || p.text.toLowerCase().includes(q));
            displayPrompts(filtered);
        }

        function filterCategory(cat, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = cat === 'all' ? prompts : prompts.filter(p => p.category === cat);
            displayPrompts(filtered);
        }

        function tryNow(text) {
            window.location.href = `index.html?prompt=${text}`;
        }

        function openSubmitModal() { document.getElementById('submitModal').classList.add('active'); }
        function closeSubmitModal() { document.getElementById('submitModal').classList.remove('active'); }

        function handlePromptSubmit(e) {
            e.preventDefault();
            showToast("Success! Your prompt sent for review.");
            closeSubmitModal();
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('themeIcon').className = isLight ? "fas fa-sun" : "fas fa-moon";
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            t.classList.add('show', 'success');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        window.onload = () => {
            if (localStorage.getItem('theme') === 'light') toggleTheme();
            displayPrompts();
        };
    </script>
</body>
</html>
