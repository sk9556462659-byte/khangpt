<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Library - KhanGPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #14141f;
            --bg-card: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #6366f1;
            --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gold: #f59e0b;
            --success: #10b981;
            --border: rgba(255,255,255,0.1);
        }

        .light-mode {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-card: #f1f3f4;
            --text-primary: #1a1a2e;
            --text-secondary: #5f6368;
            --border: rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            border: none;
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }

        .icon-btn:hover {
            background: var(--accent);
            color: white;
        }

        /* Main */
        .main {
            margin-top: 70px;
            padding: 40px 20px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 40px 20px;
            margin-bottom: 40px;
        }

        .hero h1 {
            font-size: 42px;
            margin-bottom: 15px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        /* Search */
        .search-container {
            max-width: 600px;
            margin: 0 auto 40px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 20px 25px 20px 60px;
            border: 2px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 20px;
        }

        /* Categories */
        .categories {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            overflow-x: auto;
            padding-bottom: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 12px 24px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .category-btn:hover, .category-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .category-btn i {
            font-size: 16px;
        }

        /* Prompts Grid */
        .prompts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .prompt-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .prompt-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .prompt-preview {
            height: 200px;
            background: linear-gradient(135deg, #1a1a2e, #2d2d44);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .prompt-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .prompt-preview i {
            font-size: 60px;
            color: var(--accent);
            opacity: 0.5;
        }

        .prompt-category {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 6px 12px;
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .prompt-content {
            padding: 25px;
        }

        .prompt-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .prompt-text {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .prompt-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .tag {
            padding: 5px 12px;
            background: var(--bg-primary);
            border-radius: 15px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .prompt-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .action-btn.copied {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        /* Submit Section */
        .submit-section {
            background: var(--accent-gradient);
            border-radius: 24px;
            padding: 50px;
            text-align: center;
            margin-top: 50px;
        }

        .submit-section h2 {
            font-size: 32px;
            margin-bottom: 15px;
        }

        .submit-section p {
            opacity: 0.9;
            margin-bottom: 30px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .submit-btn {
            padding: 18px 40px;
            background: white;
            color: var(--accent);
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h3 {
            font-size: 24px;
        }

        .close-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-input:focus, .form-textarea:focus {
            border-color: var(--accent);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 3000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success { border-color: var(--success); }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 32px;
            }

            .prompts-grid {
                grid-template-columns: 1fr;
            }

            .submit-section {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="dashboard.html" class="icon-btn">

        </a>

            <!-- Search -->
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" id="searchInput" 
                       placeholder="Search prompts..." onkeyup="searchPrompts()">
            </div>
        </div>

        <!-- Categories -->
        <div class="categories">
            <button class="category-btn active" onclick="filterCategory('all', this)">
                <i class="fas fa-th"></i> All
            </button>
            <button class="category-btn" onclick="filterCategory('anime', this)">
                <i class="fas fa-dragon"></i> Anime
            </button>
            <button class="category-btn" onclick="filterCategory('portrait', this)">
                <i class="fas fa-user"></i> Portrait
            </button>
            <button class="category-btn" onclick="filterCategory('nature', this)">
                <i class="fas fa-leaf"></i> Nature
            </button>
            <button class="category-btn" onclick="filterCategory('islamic', this)">
                <i class="fas fa-mosque"></i> Islamic
            </button>
            <button class="category-btn" onclick="filterCategory('cartoon', this)">
                <i class="fas fa-smile"></i> Cartoon
            </button>
            <button class="category-btn" onclick="filterCategory('cyberpunk', this)">
                <i class="fas fa-robot"></i> Cyberpunk
            </button>
            <button class="category-btn" onclick="filterCategory('architecture', this)">
                <i class="fas fa-building"></i> Architecture
            </button>
        </div>

        <!-- Prompts Grid -->
        <div class="prompts-grid" id="promptsGrid">
            <!-- Dynamic content -->
        </div>

        <!-- Submit Section -->
        <div class="submit-section">
            <h2>💡 Have a Great Prompt?</h2>
            <p>Share your creative prompts with the community and help others create amazing AI art!</p>
            <button class="submit-btn" onclick="openSubmitModal()">
                <i class="fas fa-plus-circle"></i> Submit Your Prompt
            </button>
        </div>
    </main>

    <!-- Submit Modal -->
    <div class="modal" id="submitModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Submit New Prompt</h3>
                <button class="close-btn" onclick="closeSubmitModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form onsubmit="submitPrompt(event)">
                <div class="form-group">
                    <label>Prompt Title</label>
                    <input type="text" class="form-input" id="promptTitle" 
                           placeholder="e.g., Epic Fantasy Warrior" required>
                </div>
                <div class="form-group">
                    <label>Prompt Text</label>
                    <textarea class="form-textarea" id="promptText" 
                              placeholder="Describe your prompt in detail..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select class="form-input" id="promptCategory">
                        <option value="anime">Anime</option>
                        <option value="portrait">Portrait</option>
                        <option value="nature">Nature</option>
                        <option value="islamic">Islamic</option>
                        <option value="cartoon">Cartoon</option>
                        <option value="cyberpunk">Cyberpunk</option>
                        <option value="architecture">Architecture</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn" style="width: 100%;">
                    <i class="fas fa-paper-plane"></i> Submit Prompt
                </button>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Success!</span>
    </div>
