<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - KhanGPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #14141f;
            --bg-card: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #6366f1;
            --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gold: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --border: rgba(255,255,255,0.1);
        }

        .light-mode {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-card: #f1f3f4;
            --text-primary: #1a1a2e;
            --text-secondary: #5f6368;
            --border: rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            border: none;
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }

        .icon-btn:hover {
            background: var(--accent);
            color: white;
        }

        /* Main */
        .main {
            margin-top: 70px;
            padding: 40px 20px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Profile Header */
        .profile-header {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .profile-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: var(--accent-gradient);
            opacity: 0.3;
        }

        .avatar-section {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--bg-card);
            object-fit: cover;
            position: relative;
            z-index: 1;
        }

        .avatar-edit {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 40px;
            height: 40px;
            background: var(--accent);
            border: 3px solid var(--bg-card);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2;
            transition: transform 0.2s;
        }

        .avatar-edit:hover {
            transform: scale(1.1);
        }

        .user-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .user-email {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .user-badges {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .badge {
            padding: 8px 16px;
            background: var(--accent-gradient);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .badge.gold {
            background: linear-gradient(135deg, #f59e0b, #f97316);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 24px;
        }

        .stat-icon.purple { background: rgba(99, 102, 241, 0.2); color: #6366f1; }
        .stat-icon.gold { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .stat-icon.green { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .stat-icon.blue { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Settings Sections */
        .settings-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .settings-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }

        .settings-header {
            padding: 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .settings-header i {
            width: 45px;
            height: 45px;
            background: var(--accent-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .settings-header h3 {
            font-size: 18px;
        }

        .settings-header p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 3px;
        }

        .settings-body {
            padding: 25px;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: var(--accent);
        }

        .form-input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group .form-input {
            flex: 1;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .btn-secondary {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        /* Toggle Switch */
        .toggle-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
        }

        .toggle-item:last-child {
            border-bottom: none;
        }

        .toggle-info h4 {
            margin-bottom: 5px;
        }

        .toggle-info p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .toggle-switch {
            position: relative;
            width: 55px;
            height: 30px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--border);
            border-radius: 30px;
            transition: 0.3s;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        input:checked + .toggle-slider {
            background: var(--accent);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(25px);
        }

        /* Activity Log */
        .activity-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .activity-icon.generate { background: rgba(99, 102, 241, 0.2); color: #6366f1; }
        .activity-icon.login { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .activity-icon.purchase { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }

        .activity-details h4 {
            font-size: 15px;
            margin-bottom: 3px;
        }

        .activity-details p {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .activity-time {
            margin-left: auto;
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .modal-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 40px;
        }

        .modal-icon.warning {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .modal h2 {
            margin-bottom: 15px;
        }

        .modal p {
            color: var(--text-secondary);
            margin-bottom: 25px;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 3000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }

        /* Loading */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2500;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="dashboard.html" class="icon-btn">
            <i class="fas fa-arrow-left"></i>
        </a>
        
        <div class="logo">
            <i class="fas fa-user-circle"></i> My Account
        </div>
        
        <button class="icon-btn" onclick="toggleTheme()">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>
    </header>

    <!-- Main -->
    <main class="main">
        <!-- Profile Header -->
        <div class="profile-header">
            <div class="avatar-section">
                <img src="https://ui-avatars.com/api/?name=User&background=random" alt="Avatar" class="avatar" id="userAvatar">
                <div class="avatar-edit" onclick="changeAvatar()">
                    <i class="fas fa-camera"></i>
                </div>
            </div>
            <h2 class="user-name" id="userName">Loading...</h2>
            <p class="user-email" id="userEmail">...</p>
            <div class="user-badges" id="userBadges">
                <span class="badge">Free User</span>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon purple">
                    <i class="fas fa-coins"></i>
                </div>
                <div class="stat-value" id="statCredits">0</div>
                <div class="stat-label">Credits</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon gold">
                    <i class="fas fa-image"></i>
                </div>
                <div class="stat-value" id="statImages">0</div>
                <div class="stat-label">Images</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">
                    <i class="fas fa-video"></i>
                </div>
                <div class="stat-value" id="statVideos">0</div>
                <div class="stat-label">Videos</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon blue">
                    <i class="fas fa-calendar"></i>
                </div>
                <div class="stat-value" id="statDays">0</div>
                <div class="stat-label">Days Active</div>
            </div>
        </div>

        <!-- Settings -->
        <div class="settings-container">
            <!-- Profile Settings -->
            <div class="settings-card">
                <div class="settings-header">
                    <i class="fas fa-user-edit"></i>
                    <div>
                        <h3>Profile Information</h3>
                        <p>Update your personal details</p>
                    </div>
                </div>
                <div class="settings-body">
                    <div class="form-group">
                        <label>Display Name</label>
                        <div class="input-group">
                            <input type="text" class="form-input" id="displayNameInput" placeholder="Your name">
                            <button class="btn btn-primary" onclick="updateName()">Save</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" class="form-input" id="emailInput" disabled>
                    </div>
                </div>
            </div>

            <!-- Preferences -->
            <div class="settings-card">
                <div class="settings-header">
                    <i class="fas fa-cog"></i>
                    <div>
                        <h3>Preferences</h3>
                        <p>Customize your experience</p>
                    </div>
                </div>
                <div class="settings-body">
                    <div class="toggle-item">
                        <div class="toggle-info">
                            <h4>Email Notifications</h4>
                            <p>Receive updates about new features</p>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" id="emailNotif" onchange="savePreference('emailNotif', this.checked)">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="toggle-item">
                        <div class="toggle-info">
                            <h4>Public Gallery</h4>
                            <p>Show your creations in public gallery</p>
