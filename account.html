<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - KhanGPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- CSS (Aapka Design) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f; --bg-secondary: #14141f; --bg-card: #1a1a2e;
            --text-primary: #ffffff; --text-secondary: #a0a0b0;
            --accent: #6366f1; --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --border: rgba(255,255,255,0.1); --danger: #ef4444;
        }
        .light-mode {
            --bg-primary: #f8f9fa; --bg-secondary: #ffffff; --bg-card: #f1f3f4;
            --text-primary: #1a1a2e; --text-secondary: #5f6368; --border: rgba(0,0,0,0.1);
        }
        body { font-family: sans-serif; background: var(--bg-primary); color: var(--text-primary); transition: 0.3s; }
        .header { position: fixed; top: 0; width: 100%; height: 70px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; z-index: 1000; }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .icon-btn { width: 40px; height: 40px; border: none; background: var(--bg-card); color: var(--text-primary); border-radius: 10px; cursor: pointer; border: 1px solid var(--border); }
        .main { margin-top: 70px; padding: 40px 20px; max-width: 800px; margin: auto; }
        .profile-header { background: var(--bg-card); border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 25px; border: 1px solid var(--border); }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 15px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-card); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        .stat-value { font-size: 24px; font-weight: 800; color: var(--accent); }
        .settings-card { background: var(--bg-card); border-radius: 15px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; color: var(--text-secondary); margin-bottom: 5px; font-size: 14px; }
        .form-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-primary); color: white; outline: none; }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; background: var(--accent-gradient); color: white; }
        .btn-danger { background: var(--danger); }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 25px; border-radius: 30px; display: none; }
    </style>
</head>
<body id="body">

    <header class="header">
        <button class="icon-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
        <div class="logo">KhanGPT Profile</div>
        <button class="icon-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
    </header>

    <main class="main">
        <div class="profile-header">
            <img src="https://ui-avatars.com/api/?name=User" class="avatar" id="userAvatar">
            <h2 id="userName">Loading...</h2>
            <p id="userEmail" style="color:var(--text-secondary)">...</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="statCredits">0</div><div>Credits</div></div>
            <div class="stat-card"><div class="stat-value" id="statImages">0</div><div>Images</div></div>
            <div class="stat-card"><div class="stat-value" id="statVideos">0</div><div>Videos</div></div>
        </div>

        <div class="settings-card">
            <h3>Update Profile</h3><br>
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" class="form-input" id="nameInput">
            </div>
            <button class="btn" onclick="updateProfile()">Save Changes</button>
        </div>

        <button class="btn btn-danger" style="width: 100%" onclick="logout()">Logout</button>
    </main>

    <div id="toast">Message</div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLvIHX6lGZGC7YViPH5Pf3Sc9AV7-BcM4",
            authDomain: "khangpt-4176b.firebaseapp.com",
            projectId: "khangpt-4176b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('userName').textContent = user.displayName || "KhanGPT User";
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('nameInput').value = user.displayName || "";
                document.getElementById('userAvatar').src = user.photoURL || `https://ui-avatars.com/api/?name=${user.email}`;
                loadStats(user.uid);
            } else {
                window.location.href = "index.html";
            }
        });

        async function loadStats(uid) {
            const doc = await db.collection('users').doc(uid).get();
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('statCredits').textContent = data.credits || 0;
                document.getElementById('statImages').textContent = data.imagesGenerated || 0;
                document.getElementById('statVideos').textContent = data.videosGenerated || 0;
            }
        }

        async function updateProfile() {
            const newName = document.getElementById('nameInput').value;
            if(!newName) return showToast("Enter a name");
            try {
                await auth.currentUser.updateProfile({ displayName: newName });
                await db.collection('users').doc(auth.currentUser.uid).update({ displayName: newName });
                showToast("Profile Updated!");
                document.getElementById('userName').textContent = newName;
            } catch(e) { showToast("Update Failed"); }
        }

        function logout() { auth.signOut(); }

        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            document.getElementById('themeIcon').className = isLight ? "fas fa-sun" : "fas fa-moon";
        }

        if (localStorage.getItem('theme') === 'light') toggleTheme();

        function showToast(m) {
            const t = document.getElementById('toast');
            t.textContent = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
