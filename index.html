<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhanGPT AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #14141f;
            --bg-card: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #6366f1;
            --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gold: #f59e0b;
            --border: rgba(255,255,255,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 65px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 1000;
        }

        .menu-btn {
            width: 45px;
            height: 45px;
            border: none;
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 12px;
            font-size: 20px;
            cursor: pointer;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-btn {
            padding: 10px 20px;
            background: var(--accent-gradient);
            border: none;
            color: white;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 65px;
            left: -300px;
            width: 280px;
            height: calc(100% - 65px);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            transition: left 0.3s ease;
            z-index: 999;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-overlay {
            position: fixed;
            top: 65px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 998;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            margin-bottom: 8px;
            border-radius: 12px;
            color: var(--text-primary);
            cursor: pointer;
            background: var(--bg-card);
        }

        .nav-item:hover {
            background: var(--accent);
        }

        .credits-box {
            background: var(--accent-gradient);
            padding: 20px;
            border-radius: 16px;
            margin-top: 20px;
            text-align: center;
            color: white;
        }

        .credits-amount {
            font-size: 36px;
            font-weight: 800;
            margin: 10px 0;
        }

        /* Main */
        .main {
            margin-top: 65px;
            padding: 20px;
            padding-bottom: 100px;
        }

        /* Mode Tabs */
        .mode-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto;
        }

        .mode-tab {
            flex: 1;
            padding: 15px;
            border-radius: 16px;
            border: 2px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
        }

        .mode-tab.active {
            background: var(--accent-gradient);
            border-color: transparent;
        }

        /* Welcome */
        .welcome {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome p {
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .quick-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        .quick-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
        }

        .quick-card:active {
            transform: scale(0.98);
        }

        .quick-card i {
            font-size: 32px;
            margin-bottom: 12px;
            color: var(--accent);
        }

        .quick-card h3 {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .quick-card p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Chat */
        .chat-box {
            display: none;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
        }

        .message.user {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            background: var(--accent-gradient);
            color: white;
        }

        .message.user .msg-avatar {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
        }

        .msg-bubble {
            background: var(--bg-card);
            padding: 15px 20px;
            border-radius: 20px;
            line-height: 1.5;
        }

        .message.user .msg-bubble {
            background: var(--accent-gradient);
        }

        /* Input */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            padding: 15px;
            border-top: 1px solid var(--border);
        }

        .input-box {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            max-width: 800px;
            margin: 0 auto;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            border-radius: 25px;
            padding: 5px 5px 5px 15px;
        }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            padding: 12px 0;
            outline: none;
            resize: none;
            min-height: 24px;
            max-height: 100px;
        }

        .input-btn {
            width: 45px;
            height: 45px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 50%;
            cursor: pointer;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border: none;
            background: var(--accent-gradient);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #333;
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="menu-btn" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </button>
        <div class="logo">⚡ KhanGPT</div>
        <button class="login-btn" id="loginBtn" onclick="handleLogin()">
            <i class="fas fa-user"></i> <span id="loginText">Login</span>
        </button>
    </div>

    <div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div class="nav-item" onclick="goToPage('dashboard.html')">
            <i class="fas fa-home"></i> Dashboard
        </div>
        <div class="nav-item" onclick="switchMode('chat')">
            <i class="fas fa-comments"></i> AI Chat
        </div>
        <div class="nav-item" onclick="switchMode('image')">
            <i class="fas fa-image"></i> Create Image
        </div>
        <div class="nav-item" onclick="switchMode('video')">
            <i class="fas fa-video"></i> Create Video
        </div>
        <div class="nav-item" onclick="goToPage('gallery.html')">
            <i class="fas fa-images"></i> Gallery
        </div>
        <div class="nav-item" onclick="goToPage('trending.html')">
            <i class="fas fa-fire"></i> Trending
        </div>
        <div class="nav-item" onclick="goToPage('prompt-library.html')">
            <i class="fas fa-book"></i> Prompt Library
        </div>
        <div class="nav-item" onclick="goToPage('account.html')">
            <i class="fas fa-user"></i> Account
        </div>
        <div class="nav-item" onclick="goToPage('buy.html')">
            <i class="fas fa-coins"></i> Buy Credits
        </div>
        
        <div class="credits-box">
            <div style="font-size: 14px;">Credits</div>
            <div class="credits-amount" id="creditsDisplay">0</div>
        </div>
    </div>

    <div class="main">
        <div class="mode-tabs">
            <button class="mode-tab active" onclick="switchMode('chat')" id="tab-chat">
                <i class="fas fa-comments"></i> Chat
            </button>
            <button class="mode-tab" onclick="switchMode('image')" id="tab-image">
                <i class="fas fa-image"></i> Image
            </button>
            <button class="mode-tab" onclick="switchMode('video')" id="tab-video">
                <i class="fas fa-video"></i> Video
            </button>
        </div>

        <div class="welcome" id="welcomeScreen">
            <h1>👋 Hello!</h1>
            <p>What would you like to create?</p>
            
            <div class="quick-grid">
                <div class="quick-card" onclick="quickPrompt('Explain quantum physics simply')">
                    <i class="fas fa-brain"></i>
                    <h3>Learn</h3>
                    <p>Any topic</p>
                </div>
                <div class="quick-card" onclick="quickPrompt('Generate a beautiful sunset')">
                    <i class="fas fa-image"></i>
                    <h3>Image</h3>
                    <p>AI Art</p>
                </div>
                <div class="quick-card" onclick="quickPrompt('Create a nature video')">
                    <i class="fas fa-video"></i>
                    <h3>Video</h3>
                    <p>AI Video</p>
                </div>
                <div class="quick-card" onclick="quickPrompt('Help with homework')">
                    <i class="fas fa-graduation-cap"></i>
                    <h3>Study</h3>
                    <p>Homework</p>
                </div>
            </div>
        </div>

        <div class="chat-box" id="chatBox"></div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Generating...</p>
        </div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <div class="input-wrapper">
                <button class="input-btn" onclick="attachFile()">
                    <i class="fas fa-paperclip"></i>
                </button>
                <textarea id="userInput" placeholder="Type message..." rows="1" onkeypress="handleKey(event)"></textarea>
                <button class="input-btn" onclick="toggleMic()" id="micBtn">
                    <i class="fas fa-microphone"></i>
                </button>
            </div>
            <button class="send-btn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div class="toast" id="toast">Message</div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDLvIHX6lGZGC7YViPH5Pf3Sc9AV7-BcM4",
            authDomain: "khangpt-4176b.firebaseapp.com",
            projectId: "khangpt-4176b"
        };

        // Global Variables
        let auth, db, currentUser = null;
        let currentMode = 'chat';
        let userCredits = 0;

        // Initialize Firebase Directly
        try {
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
            console.log('Firebase OK');

            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    document.getElementById('loginText').textContent = 'Logout';
                    loadUserCredits(user.uid);
                } else {
                    currentUser = null;
                    document.getElementById('loginText').textContent = 'Login';
                    document.getElementById('creditsDisplay').textContent = '0';
                }
            });
        } catch (e) {
            console.error('Error:', e);
        }

        // --- All Functions outside DOMContentLoaded to fix scope issue ---

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function handleLogin() {
            if (currentUser) {
                auth.signOut();
                showToast('Logged out');
            } else {
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider)
                    .then(() => showToast('Welcome!'))
                    .catch(e => showToast('Login failed: ' + e.message, 'error'));
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById('tab-' + mode).classList.add('active');
            
            const placeholders = {
                chat: 'Ask me anything...',
                image: 'Describe image...',
                video: 'Describe video...'
            };
            document.getElementById('userInput').placeholder = placeholders[mode];
            
            // Close menu on mobile after selection
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
        }

        async function loadUserCredits(uid) {
            try {
                const doc = await db.collection('users').doc(uid).get();
                if (doc.exists) {
                    userCredits = doc.data().credits || 0;
                    document.getElementById('creditsDisplay').textContent = userCredits;
                } else {
                    await db.collection('users').doc(uid).set({
                        credits: 10,
                        createdAt: new Date()
                    });
                    userCredits = 10;
                    document.getElementById('creditsDisplay').textContent = 10;
                    showToast('Welcome! 10 free credits');
                }
            } catch (e) {
                console.error(e);
            }
        }

        function goToPage(url) {
            window.location.href = url;
        }

        function quickPrompt(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            
            if (!text) {
                showToast('Please type something');
                return;
            }
            if (!currentUser) {
                showToast('Please login first');
                return;
            }
            if (userCredits <= 0) {
                showToast('No credits! Buy more.');
                return;
            }

            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('chatBox').style.display = 'flex';
            
            addMessage(text, 'user');
            input.value = '';
            document.getElementById('loading').classList.add('active');
            
            // Logic for AI response goes here...
            setTimeout(() => {
                document.getElementById('loading').classList.remove('active');
                addMessage("This is a demo response. Connect your API to get real answers!", "ai");
            }, 1500);
        }

        function addMessage(text, sender) {
            const chatBox = document.getElementById('chatBox');
            if (!chatBox) return;

            const msgDiv = document.createElement('div');
            // Yahan Template Literal (Backticks) ka sahi use:
            msgDiv.className = `message ${sender}`; 
            
            msgDiv.innerHTML = `
                <div class="msg-avatar">${sender === 'user' ? 'U' : 'K'}</div>
                <div class="msg-bubble">${text}</div>
            `;
            
            chatBox.appendChild(msgDiv);
            
            // Taki naya message aate hi scroll niche chala jaye
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Ye functions bhi check kar lein agar missing hain toh:
        function attachFile() { 
            showToast('File attachment coming soon!'); 
        }
        
        function toggleMic() { 
            showToast('Voice features coming soon!'); 
        }
    </script>
</body>
</html>
