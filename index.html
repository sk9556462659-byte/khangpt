<!DOCTYPE html>
<html>
<head>
<title>KhanGPT AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#0f0c29;color:white;}
.nav{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);}
.brand h2{margin:0;background:linear-gradient(90deg,gold,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.right{display:flex;align-items:center;gap:10px;}
button{padding:8px 14px;border:none;border-radius:10px;background:gold;cursor:pointer;font-weight:bold;}
.hero{text-align:center;padding:40px 20px;}
.generator{text-align:center;padding:20px;}
.generator input{width:90%;max-width:500px;padding:12px;border:none;border-radius:10px;}
#result img{margin-top:20px;max-width:90%;border-radius:15px;}
.usage{font-size:14px;margin-top:10px;}

.history{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
margin-top:30px;
}

.history img{
width:150px;
border-radius:10px;
}

.templates{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-bottom:20px;
}

.templates button{
background:#444;
color:white;
}

.pages{
text-align:center;
margin-top:10px;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

</style>
</head>

<body>

<div class="nav">

<div class="brand">
<h2>KhanGPT</h2>
</div>

<div class="right">

<span id="userName"></span>

<button id="loginBtn">Login</button>

<button id="logoutBtn" style="display:none;">Logout</button>

</div>

</div>

<div class="hero">
<h1>Create Stunning AI Images</h1>
</div>

<div class="pages">

<a href="/gallery.html">
<button>Explore Gallery</button>
</a>

<a href="/trending.html">
<button>🔥 Trending</button>
</a>

<a href="/buy.html">
<button>💰 Buy Credits</button>
</a>

</div>

<div class="generator">

<div class="templates">

<button onclick="setPrompt('Islamic calligraphy golden light mosque background')">Islamic Art</button>

<button onclick="setPrompt('cute 3D cartoon character pixar style')">Cartoon</button>

<button onclick="setPrompt('anime character ultra detailed cinematic lighting')">Anime</button>

<button onclick="setPrompt('youtube thumbnail dramatic lighting ultra hd')">Thumbnail</button>

<button onclick="setPrompt('realistic product photography studio lighting')">Product</button>

</div>

<input type="text" id="prompt" placeholder="Enter your prompt">

<br><br>

<button id="generateBtn">Generate</button>

<div class="usage" id="usageText">Credits: 0</div>

<div id="result"></div>

<h2 style="margin-top:40px;">My Images</h2>

<div id="history" class="history"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

function setPrompt(text){
document.getElementById("prompt").value=text;
}

const firebaseConfig = {
apiKey:"AIzaSyDLvIHX6lGZGC7YViPH5Pf3Sc9AV7-BcM4",
authDomain:"khangpt-4176b.firebaseapp.com",
projectId:"khangpt-4176b",
storageBucket:"khangpt-4176b.firebasestorage.app",
messagingSenderId:"317363736581",
appId:"1:317363736581:web:28441dae26ab4731290c6c"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

let currentUser=null;
let userCredits=0;

auth.onAuthStateChanged(async(user)=>{

if(user){

currentUser=user;

document.getElementById("userName").innerText=
user.displayName||user.email;

document.getElementById("loginBtn").style.display="none";
document.getElementById("logoutBtn").style.display="inline-block";

await setupUserData();
loadHistory();

}else{

currentUser=null;
userCredits=0;

document.getElementById("userName").innerText="";
document.getElementById("loginBtn").style.display="inline-block";
document.getElementById("logoutBtn").style.display="none";

updateUsageUI();
document.getElementById("history").innerHTML="";

}

});

document.getElementById("loginBtn").onclick=async()=>{
const provider=new firebase.auth.GoogleAuthProvider();
await auth.signInWithPopup(provider);
};

document.getElementById("logoutBtn").onclick=()=>{
auth.signOut();
};

async function setupUserData(){

const userRef=db.collection("users").doc(currentUser.uid);
const doc=await userRef.get();

const now=Date.now();
const oneDay=24*60*60*1000;

if(!doc.exists){

await userRef.set({
credits:5,
lastReset:now,
createdAt:firebase.firestore.FieldValue.serverTimestamp()
});

userCredits=5;

}else{

const data=doc.data();
const lastReset=data.lastReset||0;

if(now-lastReset>oneDay){

await userRef.update({
credits:5,
lastReset:now
});

userCredits=5;

}else{

userCredits=data.credits||0;

}

}

updateUsageUI();

}

async function loadHistory(){

const snap=await db.collection("users")
.doc(currentUser.uid)
.collection("images")
.orderBy("createdAt","desc")
.get();

const historyDiv=document.getElementById("history");

historyDiv.innerHTML="";

snap.forEach(doc=>{

const data=doc.data();

historyDiv.innerHTML+=
'<div>'+
'<img src="'+data.imageUrl+'">'+
'<p style="font-size:11px">'+data.prompt+'</p>'+
'</div>';

});

}

function updateUsageUI(){

document.getElementById("usageText").innerText=
"Credits: "+userCredits;

}

document.getElementById("generateBtn").onclick=async function(){

const prompt=document.getElementById("prompt").value.trim();

if(!prompt)return;

if(!currentUser){

alert("Please login first.");
return;

}

if(userCredits<=0){

alert("No credits left. Please buy credits.");

return;

}

document.getElementById("result").innerHTML="<p>Generating image...</p>";

try{

const res=await fetch("/api/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt})
});

const data=await res.json();

if(!data.url){

alert("Image generation failed");
return;

}

document.getElementById("result").innerHTML=

'<div style="position:relative;display:inline-block;">'+
'<img id="generatedImage" src="'+data.url+'">'+
'<span style="position:absolute;bottom:10px;right:10px;background:black;color:white;padding:3px 6px;font-size:10px;">KhanGPT</span>'+
'</div>'+

'<div style="margin-top:15px;">'+
'<button onclick="downloadImage()">Download</button> '+
'<button onclick="shareImage()">Share</button>'+
'</div>';

await db.collection("users")
.doc(currentUser.uid)
.collection("images")
.add({
prompt:prompt,
imageUrl:data.url,
createdAt:firebase.firestore.FieldValue.serverTimestamp()
});

userCredits--;

await db.collection("users")
.doc(currentUser.uid)
.update({credits:userCredits});

updateUsageUI();
loadHistory();

}catch(err){

alert("Error: "+err.message);

}

};

function downloadImage(){

const img=document.getElementById("generatedImage").src;

const a=document.createElement("a");

a.href=img;

a.download="khangpt-image.png";

a.click();

}

function shareImage(){

const img=document.getElementById("generatedImage").src;

if(navigator.share){

navigator.share({
title:"AI Image",
text:"Created with KhanGPT",
url:img
});

}else{

alert("Share not supported on this browser");

}

}

</script>

</body>
</html>
