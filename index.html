<script>

const firebaseConfig = {
apiKey:"AIzaSyDLvIHX6lGZGC7YViPH5Pf3Sc9AV7-BcM4",
authDomain:"khangpt-4176b.firebaseapp.com",
projectId:"khangpt-4176b"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser=null;
let currentMode="chat";
let userCredits=0;

auth.onAuthStateChanged(async(user)=>{

if(user){

currentUser=user;

document.getElementById("loginText").innerText="Logout";

const ref=db.collection("users").doc(user.uid);

const doc=await ref.get();

if(!doc.exists){

await ref.set({
credits:10,
createdAt:Date.now()
});

userCredits=10;

}else{

userCredits=doc.data().credits || 0;

}

document.getElementById("creditsDisplay").innerText=userCredits;

}else{

currentUser=null;

document.getElementById("loginText").innerText="Login";

document.getElementById("creditsDisplay").innerText="0";

}

});

function toggleMenu(){

document.getElementById("sidebar").classList.toggle("open");

document.getElementById("overlay").classList.toggle("active");

}

function goToPage(url){

window.location.href=url;

}

function switchMode(mode){

currentMode=mode;

document.querySelectorAll(".mode-tab").forEach(tab=>{
tab.classList.remove("active");
});

document.getElementById("tab-"+mode).classList.add("active");

const placeholders={
chat:"Ask anything...",
image:"Describe image...",
video:"Describe video..."
};

document.getElementById("userInput").placeholder=placeholders[mode];

toggleMenu();

}

function handleLogin(){

if(currentUser){

auth.signOut();

}else{

const provider=new firebase.auth.GoogleAuthProvider();

auth.signInWithPopup(provider);

}

}

function quickPrompt(text){

document.getElementById("userInput").value=text;

sendMessage();

}

function handleKey(e){

if(e.key==="Enter" && !e.shiftKey){

e.preventDefault();

sendMessage();

}

}

async function sendMessage(){

const input=document.getElementById("userInput");

const text=input.value.trim();

if(!text){

showToast("Type message");

return;

}

if(!currentUser){

showToast("Login first");

return;

}

if(userCredits<=0){

showToast("No credits left");

return;

}

document.getElementById("welcomeScreen").style.display="none";

document.getElementById("chatBox").style.display="flex";

addMessage(text,"user");

input.value="";

document.getElementById("loading").classList.add("active");

setTimeout(async()=>{

let response="";

if(currentMode==="chat"){

response="🤖 AI Response:\n\nYou asked: "+text+"\n\nReal AI API can be connected here.";

}

if(currentMode==="image"){

response="🎨 Image generated for:\n\n"+text+"\n\n(Connect image API here)";

}

if(currentMode==="video"){

response="🎬 Video generator coming soon.";

}

addMessage(response,"ai");

document.getElementById("loading").classList.remove("active");

userCredits--;

document.getElementById("creditsDisplay").innerText=userCredits;

await db.collection("users").doc(currentUser.uid).update({
credits:userCredits
});

},1500);

}

function addMessage(text,type){

const box=document.getElementById("chatBox");

const div=document.createElement("div");

div.className="message "+type;

div.innerHTML=

'<div class="msg-avatar">'+(type==="user"?"U":"AI")+'</div>'+
'<div class="msg-bubble">'+text+'</div>';

box.appendChild(div);

box.scrollTop=box.scrollHeight;

}

function attachFile(){

showToast("Upload coming soon");

}

function toggleMic(){

showToast("Voice input coming soon");

}

function showToast(msg){

const toast=document.getElementById("toast");

toast.innerText=msg;

toast.classList.add("show");

setTimeout(()=>{

toast.classList.remove("show");

},3000);

}

</script>
