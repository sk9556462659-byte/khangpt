<!DOCTYPE html>
<html>
<head>

<title>KhanGPT AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0c29;
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#14113b;
position:sticky;
top:0;
}

.logo{
color:gold;
font-weight:bold;
font-size:18px;
}

.menu{
font-size:22px;
cursor:pointer;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#1b1738;
padding:20px;
transition:.3s;
z-index:10;
}

.sidebar.open{
left:0;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
}

/* MAIN */

.main{
padding:25px;
text-align:center;
}

/* SUGGESTION CARDS */

.cards{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}

.card{
background:#1b1738;
padding:14px;
border-radius:25px;
cursor:pointer;
}

/* RESULT */

#result img{
margin-top:20px;
max-width:90%;
border-radius:12px;
}

/* BOTTOM BAR */

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#14113b;
padding:12px;
display:flex;
gap:8px;
}

.bottom input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
}

.bottom button{
padding:10px 14px;
border:none;
border-radius:10px;
background:gold;
font-weight:bold;
}

.footer{
text-align:center;
padding:40px 10px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h3>KhanGPT</h3>

<a href="#">Dashboard</a>
<a href="gallery.html">Gallery</a>
<a href="trending.html">Trending</a>
<a href="buy.html">Buy Credits</a>
<a href="account.html">Account</a>

</div>

<!-- HEADER -->

<div class="header">

<div class="menu" onclick="toggleMenu()">☰</div>

<div class="logo">KhanGPT AI</div>

<div>👤</div>

</div>

<!-- MAIN -->

<div class="main">

<h2>Hi 👋</h2>

<h1>What would you like to create?</h1>

<div class="cards">

<div class="card" onclick="setPrompt('ultra realistic ai art')">
🖼 Create Image
</div>

<div class="card" onclick="alert('Video generator coming soon')">
🎬 Create Video (Coming Soon)
</div>

<div class="card" onclick="location.href='gallery.html'">
🎨 Explore Gallery
</div>

<div class="card" onclick="setPrompt('youtube thumbnail dramatic lighting ultra hd')">
⚡ AI Prompt Ideas
</div>

</div>

<div id="result"></div>

<div class="footer">

<p>Credits: 5</p>

</div>

</div>

<!-- BOTTOM GENERATOR BAR -->

<div class="bottom">

<button onclick="upload()">+</button>

<input id="prompt" placeholder="Describe your image...">

<button onclick="generate()">Generate</button>

</div>

<script>

/* SIDEBAR */

function toggleMenu(){

document.getElementById("sidebar").classList.toggle("open");

}

/* PROMPT */

function setPrompt(text){

document.getElementById("prompt").value=text;

}

/* UPLOAD */

function upload(){

alert("Upload feature coming soon");

}

/* GENERATE */

async function generate(){

const prompt=document.getElementById("prompt").value;

if(!prompt){

alert("Enter prompt");

return;

}

document.getElementById("result").innerHTML="Generating...";

const res=await fetch("/api/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({prompt})

});

const data=await res.json();

document.getElementById("result").innerHTML=

'<img src="'+data.url+'">';

}

</script>

</body>
</html>
