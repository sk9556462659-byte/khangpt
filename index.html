<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhanGPT AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ... Aapka pura Style section bilkul same rahega ... */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-primary: #0a0a0f; --bg-secondary: #14141f; --bg-card: #1a1a2e; --text-primary: #ffffff; --text-secondary: #a0a0b0; --accent: #6366f1; --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6); --gold: #f59e0b; --border: rgba(255,255,255,0.1); }
        body { font-family: -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .header { position: fixed; top: 0; left: 0; right: 0; height: 65px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; }
        .menu-btn { width: 45px; height: 45px; border: none; background: var(--bg-card); color: var(--text-primary); border-radius: 12px; font-size: 20px; cursor: pointer; }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-btn { padding: 10px 20px; background: var(--accent-gradient); border: none; color: white; border-radius: 25px; font-weight: 600; cursor: pointer; }
        .sidebar { position: fixed; top: 65px; left: -300px; width: 280px; height: calc(100% - 65px); background: var(--bg-secondary); border-right: 1px solid var(--border); transition: 0.3s; z-index: 999; padding: 20px; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .sidebar-overlay { position: fixed; top: 65px; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 998; }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 15px; margin-bottom: 8px; border-radius: 12px; color: var(--text-primary); cursor: pointer; background: var(--bg-card); text-decoration: none; }
        .credits-box { background: var(--accent-gradient); padding: 20px; border-radius: 16px; margin-top: 20px; text-align: center; color: white; }
        .main { margin-top: 65px; padding: 20px; padding-bottom: 120px; }
        .mode-tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .mode-tab { flex: 1; padding: 15px; border-radius: 16px; border: 2px solid var(--border); background: var(--bg-card); color: var(--text-primary); cursor: pointer; text-align: center; }
        .mode-tab.active { background: var(--accent-gradient); border-color: transparent; }
        .chat-box { display: none; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .message { display: flex; gap: 10px; max-width: 85%; }
        .message.user { margin-left: auto; flex-direction: row-reverse; }
        .msg-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--accent-gradient); color: white; }
        .msg-bubble { background: var(--bg-card); padding: 12px 18px; border-radius: 20px; line-height: 1.5; font-size: 15px; }
        .message.user .msg-bubble { background: var(--accent-gradient); }
        .input-area { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-secondary); padding: 15px; border-top: 1px solid var(--border); }
        .input-box { display: flex; gap: 10px; align-items: flex-end; max-width: 800px; margin: 0 auto; }
        .input-wrapper { flex: 1; background: var(--bg-card); border-radius: 25px; padding: 5px 15px; display: flex; align-items: center; }
        #userInput { flex: 1; background: transparent; border: none; color: var(--text-primary); font-size: 16px; padding: 12px 0; outline: none; resize: none; }
        .send-btn { width: 50px; height: 50px; border: none; background: var(--accent-gradient); color: white; border-radius: 50%; cursor: pointer; }
        .loading { display: none; text-align: center; padding: 20px; }
        .loading.active { display: block; }
        .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #333; color: white; padding: 12px 25px; border-radius: 25px; opacity: 0; transition: 0.3s; z-index: 2000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div class="header">
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <div class="logo">⚡ KhanGPT</div>
        <button class="login-btn" onclick="handleLogin()"><i class="fas fa-user"></i> <span id="loginText">Login</span></button>
    </div>

    <div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <a class="nav-item" href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
        <div class="nav-item" onclick="switchMode('chat')"><i class="fas fa-comments"></i> AI Chat</div>
        <div class="nav-item" onclick="switchMode('image')"><i class="fas fa-image"></i> Create Image</div>
        <div class="credits-box">
            <div style="font-size: 14px;">Credits</div>
            <div class="credits-amount" id="creditsDisplay">0</div>
        </div>
    </div>

    <div class="main">
        <div class="mode-tabs">
            <button class="mode-tab active" onclick="switchMode('chat')" id="tab-chat">Chat</button>
            <button class="mode-tab" onclick="switchMode('image')" id="tab-image">Image</button>
        </div>

        <div class="welcome" id="welcomeScreen">
            <h1>👋 Hello!</h1>
            <p>I am KhanGPT. How can I help you today?</p>
        </div>

        <div class="chat-box" id="chatBox"></div>
        <div class="loading" id="loading"><div class="spinner"></div><p>AI is thinking...</p></div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Ask me anything..." rows="1"></textarea>
            </div>
            <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="toast" id="toast">Message</div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLvIHX6lGZGC7YViPH5Pf3Sc9AV7-BcM4",
            authDomain: "khangpt-4176b.firebaseapp.com",
            projectId: "khangpt-4176b"
        };

        let auth, db, currentUser = null, userCredits = 0, currentMode = 'chat';

        firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginText').textContent = 'Logout';
                loadUserCredits(user.uid);
            } else {
                currentUser = null;
                document.getElementById('loginText').textContent = 'Login';
                document.getElementById('creditsDisplay').textContent = '0';
            }
        });

        async function loadUserCredits(uid) {
            const doc = await db.collection('users').doc(uid).get();
            if (doc.exists) {
                userCredits = doc.data().credits || 0;
            } else {
                userCredits = 10;
                await db.collection('users').doc(uid).set({ credits: 10, createdAt: new Date() });
            }
            document.getElementById('creditsDisplay').textContent = userCredits;
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        async function handleLogin() {
            if (currentUser) { await auth.signOut(); showToast('Logged out'); }
            else {
                const provider = new firebase.auth.GoogleAuthProvider();
                await auth.signInWithPopup(provider);
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + mode).classList.add('active');
            toggleMenu();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            
            if (!text) return;
            if (!currentUser) return showToast('Please login first');
            if (userCredits <= 0) return showToast('No credits left. Buy more!');

            // UI Changes
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('chatBox').style.display = 'flex';
            addMessage(text, 'user');
            input.value = '';
            document.getElementById('loading').classList.add('active');

            try {
                // Sahi API Path ka istemal
                let apiUrl = currentMode === 'chat' ? "/api/chat" : "/api/generate-image";

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });

                if (!response.ok) {
                    const errorMsg = await response.text();
                    throw new Error(errorMsg || "Server Error");
                }

                const data = await response.json();
                document.getElementById('loading').classList.remove('active');

                if (currentMode === 'chat') {
                    addMessage(data.text, 'ai');
                } else {
                    const imgHtml = `<img src="${data.url}" style="width:100%; border-radius:15px; margin-top:10px;">`;
                    addMessage(imgHtml, 'ai', true);
                }

                // Credit Update sirf success par
                userCredits--;
                document.getElementById('creditsDisplay').textContent = userCredits;
                db.collection('users').doc(currentUser.uid).update({ credits: userCredits });

            } catch (e) {
                document.getElementById('loading').classList.remove('active');
                console.error("AI Error:", e);
                addMessage("❌ Error: " + e.message, "ai");
            }
        }

        function addMessage(text, sender, isHtml = false) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            const content = isHtml ? text : text.replace(/\n/g, '<br>');
            div.innerHTML = `<div class="msg-avatar">${sender === 'user' ? 'U' : 'K'}</div><div class="msg-bubble">${content}</div>`;
            chatBox.appendChild(div);
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.textContent = m;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
