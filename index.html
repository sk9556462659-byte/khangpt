<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhanGPT AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: white;
            min-height: 100vh;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .menu-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(45deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-btn {
            padding: 8px 16px;
            background: linear-gradient(45deg, #6366f1, #8b5cf6);
            border: none;
            color: white;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 60px;
            left: -280px;
            width: 280px;
            height: calc(100% - 60px);
            background: rgba(20, 20, 30, 0.98);
            transition: left 0.3s;
            z-index: 999;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
        }

        .sidebar-item:hover {
            background: rgba(99, 102, 241, 0.3);
        }

        .credits-box {
            background: linear-gradient(45deg, #6366f1, #8b5cf6);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            margin-top: 20px;
        }

        .credits-count {
            font-size: 36px;
            font-weight: bold;
            margin: 10px 0;
        }

        /* Main Content */
        .main {
            margin-top: 60px;
            padding: 20px;
            padding-bottom: 100px;
        }

        /* Mode Tabs */
        .mode-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .mode-tab {
            padding: 12px 24px;
            border-radius: 25px;
            border: 2px solid rgba(255,255,255,0.2);
            background: transparent;
            color: white;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-tab.active {
            background: linear-gradient(45deg, #6366f1, #8b5cf6);
            border-color: transparent;
        }

        /* Welcome Screen */
        .welcome {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome p {
            color: #888;
            margin-bottom: 30px;
        }

        /* Quick Cards */
        .quick-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .quick-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .quick-card:active {
            transform: scale(0.98);
        }

        .quick-card i {
            font-size: 28px;
            margin-bottom: 10px;
            color: #6366f1;
        }

        .quick-card h3 {
            font-size: 14px;
            margin-bottom: 5px;
        }

        .quick-card p {
            font-size: 12px;
            color: #666;
            margin: 0;
        }

        /* Chat Area */
        .chat-box {
            display: none;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
        }

        .message.user {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .message.ai .msg-avatar {
            background: linear-gradient(45deg, #6366f1, #8b5cf6);
        }

        .message.user .msg-avatar {
            background: linear-gradient(45deg, #f59e0b, #ef4444);
        }

        .msg-content {
            background: rgba(255,255,255,0.1);
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 15px;
        }

        .message.user .msg-content {
            background: linear-gradient(45deg, #6366f1, #8b5cf6);
        }

        .msg-image {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 10px;
        }

        /* Input Area */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 20, 30, 0.98);
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .input-box {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 5px;
        }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 15px;
            font-size: 16px;
            outline: none;
            resize: none;
            max-height: 100px;
        }

        .input-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn {
            background: linear-gradient(45deg, #6366f1, #8b5cf6);
        }

        .mic-btn.recording {
            background: #ef4444;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Overlay */
        .overlay {
            display: none;
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 998;
        }

        .overlay.active {
            display: block;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.error {
            background: #ef4444;
        }

        .toast.success {
            background: #10b981;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <button class="menu-btn" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </button>
        <div class="logo">⚡ KhanGPT</div>
        <button class="login-btn" id="loginBtn" onclick="login()">
            <i class="fas fa-user"></i> Login
        </button>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-item" onclick="switchMode('chat')">
            <i class="fas fa-comments"></i> AI Chat
        </div>
        <div class="sidebar-item" onclick="switchMode('image')">
            <i class="fas fa-image"></i> Create Image
        </div>
        <div class="sidebar-item" onclick="switchMode('video')">
            <i class="fas fa-video"></i> Create Video
        </div>
        <div class="sidebar-item" onclick="showToast('Coming soon!')">
            <i class="fas fa-history"></i> History
        </div>
        <div class="sidebar-item" onclick="showToast('Coming soon!')">
            <i class="fas fa-cog"></i> Settings
        </div>
        
        <div class="credits-box">
            <div>Available Credits</div>
            <div class="credits-count" id="creditsDisplay">0</div>
            <button class="login-btn" onclick="showToast('Buy credits - Coming soon!')">
                Buy More
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main">
        <!-- Mode Tabs -->
        <div class="mode-tabs">
            <button class="mode-tab active" onclick="switchMode('chat')" data-mode="chat">
                <i class="fas fa-comments"></i> Chat
            </button>
            <button class="mode-tab" onclick="switchMode('image')" data-mode="image">
                <i class="fas fa-image"></i> Image
            </button>
            <button class="mode-tab" onclick="switchMode('video')" data-mode="video">
                <i class="fas fa-video"></i> Video
            </button>
        </div>

        <!-- Welcome Screen -->
        <div class="welcome" id="welcomeScreen">
            <h1>👋 Hello!</h1>
            <p>What would you like to create today?</p>
            
            <div class="quick-grid">
                <div class="quick-card" onclick="quickAction('Explain quantum physics simply')">
                    <i class="fas fa-brain"></i>
                    <h3>Learn</h3>
                    <p>Any topic</p>
                </div>
                <div class="quick-card" onclick="quickAction('Generate a beautiful sunset')">
                    <i class="fas fa-image"></i>
                    <h3>Image</h3>
                    <p>AI Art</p>
                </div>
                <div class="quick-card" onclick="quickAction('Create a nature video')">
                    <i class="fas fa-video"></i>
                    <h3>Video</h3>
                    <p>AI Video</p>
                </div>
                <div class="quick-card" onclick="quickAction('Help with homework')">
                    <i class="fas fa-graduation-cap"></i>
                    <h3>Study</h3>
                    <p>Homework</p>
                </div>
            </div>
        </div>

        <!-- Chat Messages -->
        <div class="chat-box" id="chatBox"></div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Generating...</p>
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="input-box">
            <button class="input-btn" onclick="showToast('Attach - Coming soon!')">
                <i class="fas fa-paperclip"></i>
            </button>
            <textarea id="userInput" placeholder="Type your message..." rows="1" onkeypress="handleKey(event)"></textarea>
            <button class="input-btn mic-btn" id="micBtn" onclick="toggleMic()">
                <i class="fas fa-microphone"></i>
            </button>
            <button class="input-btn send-btn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">Message</div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDLvIHX6lGZGC7YViPH5Pf3Sc9AV7-BcM4",
            authDomain: "khangpt-4176b.firebaseapp.com",
            projectId: "khangpt-4176b"
        };

        // Initialize Firebase safely
        let auth, db, currentUser = null, userCredits = 0;
        
        try {
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
            console.log('Firebase initialized');
        } catch (e) {
            console.error('Firebase error:', e);
        }

        let currentMode = 'chat';
        let isRecording = false;

        // Auth State
        if (auth) {
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    currentUser = user;
                    document.getElementById('loginBtn').innerHTML = '<i class="fas fa-sign-out-alt"></i> Logout';
                    document.getElementById('loginBtn').onclick = logout;
                    
                    // Load credits
                    try {
                        const doc = await db.collection('users').doc(user.uid).get();
                        if (doc.exists) {
                            userCredits = doc.data().credits || 0;
                        } else {
                            await db.collection('users').doc(user.uid).set({ credits: 10 });
                            userCredits = 10;
                        }
                        updateCredits();
                    } catch (e) {
                        console.error('Credits error:', e);
                    }
                } else {
                    currentUser = null;
                    userCredits = 0;
                    document.getElementById('loginBtn').innerHTML = '<i class="fas fa-user"></i> Login';
                    document.getElementById('loginBtn').onclick = login;
                    updateCredits();
                }
            });
        }

        function updateCredits() {
            document.getElementById('creditsDisplay').textContent = userCredits;
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function switchMode(mode) {
            currentMode = mode;
            
            // Update tabs
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.mode === mode);
            });
            
            // Update placeholder
            const placeholders = {
                chat: 'Ask me anything...',
                image: 'Describe image...',
                video: 'Describe video...'
            };
            document.getElementById('userInput').placeholder = placeholders[mode];
            
            // Show welcome if no messages
            const chatBox = document.getElementById('chatBox');
            if (chatBox.children.length === 0) {
                document.getElementById('welcomeScreen').style.display = 'block';
                chatBox.style.display = 'none';
            }
        }

        async function login() {
            if (!auth) {
                showToast('Error: Firebase not loaded', 'error');
                return;
            }
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                await auth.signInWithPopup(provider);
                showToast('Welcome!', 'success');
            } catch (e) {
                showToast('Login failed: ' + e.message, 'error');
            }
        }

        function logout() {
            if (auth) auth.signOut();
            showToast('Logged out', 'success');
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function quickAction(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        function toggleMic() {
            if (!('webkitSpeechRecognition' in window)) {
                showToast('Voice not supported', 'error');
                return;
            }
            
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            isRecording = true;
            document.getElementById('micBtn').classList.add('recording');
            
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'en-US';
            recognition.onresult = (e) => {
                document.getElementById('userInput').value = e.results[0][0].transcript;
                stopRecording();
            };
            recognition.onerror = () => {
                stopRecording();
                showToast('Voice error', 'error');
            };
            recognition.start();
        }

        function stopRecording() {
            isRecording = false;
            document.getElementById('micBtn').classList.remove('recording');
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            
            if (!text) return;
            if (!currentUser) {
                showToast('Please login first', 'error');
                return;
            }
            if (userCr
