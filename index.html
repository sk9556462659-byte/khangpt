<!DOCTYPE html>
<html>
<head>
<title>KhanGPT AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#0f0c29;color:white;}
.nav{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);}
.brand h2{margin:0;background:linear-gradient(90deg,gold,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.right{display:flex;align-items:center;gap:10px;}
button{padding:8px 14px;border:none;border-radius:10px;background:gold;cursor:pointer;font-weight:bold;}
.hero{text-align:center;padding:40px 20px;}
.generator{text-align:center;padding:20px;}
.generator input{width:90%;max-width:500px;padding:12px;border:none;border-radius:10px;}
#result img{margin-top:20px;max-width:90%;border-radius:15px;}
.usage{font-size:12px;opacity:.7;margin-top:10px;}
</style>
</head>

<body>

<div class="nav">
<div class="brand"><h2>KhanGPT</h2></div>
<div class="right">
<span id="userName"></span>
<button id="loginBtn">Login</button>
<button id="logoutBtn" style="display:none;">Logout</button>
</div>
</div>

<div class="hero"><h1>Create Stunning AI Images</h1></div>

<div class="generator">
<input type="text" id="prompt" placeholder="Enter your prompt"><br><br>
<button id="generateBtn">Generate</button>
<div class="usage" id="usageText"></div>
<div id="result"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDLvIHX6lGZGC7YViPH5Pf3Sc9AV7-BcM4",
  authDomain: "khangpt-4176b.firebaseapp.com",
  projectId: "khangpt-4176b",
  storageBucket: "khangpt-4176b.firebasestorage.app",
  messagingSenderId: "317363736581",
  appId: "1:317363736581:web:28441dae26ab4731290c6c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

let currentUser = null;
const MAX_FREE = 2;

/* Auth state listener */
auth.onAuthStateChanged((user) => {
  if (user) {
    currentUser = user;
    document.getElementById("userName").innerText = user.displayName || user.email;
    document.getElementById("loginBtn").style.display = "none";
    document.getElementById("logoutBtn").style.display = "inline-block";
  } else {
    currentUser = null;
    document.getElementById("userName").innerText = "";
    document.getElementById("loginBtn").style.display = "inline-block";
    document.getElementById("logoutBtn").style.display = "none";
  }
  updateUsage();
});

/* 🔥 Stable Popup Login */
document.getElementById("loginBtn").addEventListener("click", async () => {
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await auth.signInWithPopup(provider);
  } catch (error) {
    console.error(error);
    alert(error.message);
  }
});

/* Logout */
document.getElementById("logoutBtn").addEventListener("click", () => {
  auth.signOut();
});

/* Usage */
function usageKey(){
  if(!currentUser) return "guest_usage";
  return "usage_"+currentUser.uid+"_"+new Date().toISOString().split('T')[0];
}

function getUsage(){
  return parseInt(localStorage.getItem(usageKey())) || 0;
}

function increaseUsage(){
  localStorage.setItem(usageKey(), getUsage()+1);
}

function updateUsage(){
  document.getElementById("usageText").innerText =
  "Free Usage: " + getUsage() + "/" + MAX_FREE;
}

/* Generate */
document.getElementById("generateBtn").addEventListener("click", generateImage);

async function generateImage(){
  const prompt = document.getElementById("prompt").value.trim();
  if(!prompt) return;

  if(getUsage() >= MAX_FREE){
    alert("Free limit reached. Upgrade coming soon.");
    return;
  }

  try{
    const res = await fetch("/api/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt})
    });

    const data = await res.json();

    if(data.url){
      increaseUsage();
      updateUsage();
      document.getElementById("result").innerHTML =
      '<img src="'+data.url+'">';
    }

  }catch(err){
    console.error(err);
    alert("Image generation failed.");
  }
}
</script>

</body>
</html>
