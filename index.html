<!DOCTYPE html>
<html>
<head>
<title>KhanGPT AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#0f0c29;color:white;}
.nav{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);}
.brand h2{margin:0;background:linear-gradient(90deg,gold,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.right{display:flex;align-items:center;gap:10px;}
button{padding:8px 14px;border:none;border-radius:10px;background:gold;cursor:pointer;font-weight:bold;}
.hero{text-align:center;padding:40px 20px;}
.generator{text-align:center;padding:20px;}
.generator input{width:90%;max-width:500px;padding:12px;border:none;border-radius:10px;}
#result img{margin-top:20px;max-width:90%;border-radius:15px;}
.usage{font-size:14px;opacity:.9;margin-top:10px;}
.history{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin-top:30px;}
.history img{width:150px;border-radius:10px;}
</style>
</head>

<body>

<div class="nav">
<div class="brand"><h2>KhanGPT</h2></div>
<div class="right">
<span id="userName"></span>
<button id="loginBtn">Login</button>
<button id="logoutBtn" style="display:none;">Logout</button>
</div>
</div>

<div class="hero"><h1>Create Stunning AI Images</h1></div>

<div class="generator">
<input type="text" id="prompt" placeholder="Enter your prompt"><br><br>
<button id="generateBtn">Generate</button>
<div class="usage" id="usageText">Credits: 0</div>
<div id="result"></div>

<h2 style="margin-top:40px;">My Images</h2>
<div id="history" class="history"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDLvIHX6lGZGC7YViPH5Pf3Sc9AV7-BcM4",
  authDomain: "khangpt-4176b.firebaseapp.com",
  projectId: "khangpt-4176b",
  storageBucket: "khangpt-4176b.firebasestorage.app",
  messagingSenderId: "317363736581",
  appId: "1:317363736581:web:28441dae26ab4731290c6c"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let userCredits = 0;

auth.onAuthStateChanged(async (user) => {

  if (user) {

    currentUser = user;

    document.getElementById("userName").innerText =
      user.displayName || user.email;

    document.getElementById("loginBtn").style.display = "none";
    document.getElementById("logoutBtn").style.display = "inline-block";

    await setupUserData();
    loadHistory();

  } else {

    currentUser = null;
    userCredits = 0;

    document.getElementById("userName").innerText = "";
    document.getElementById("loginBtn").style.display = "inline-block";
    document.getElementById("logoutBtn").style.display = "none";

    updateUsageUI();
    document.getElementById("history").innerHTML = "";
  }
});

/* LOGIN */
document.getElementById("loginBtn").onclick = async () => {
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await auth.signInWithPopup(provider);
  } catch (error) {
    alert(error.message);
  }
};

/* LOGOUT */
document.getElementById("logoutBtn").onclick = () => {
  auth.signOut();
};

/* DAILY RESET SYSTEM */
async function setupUserData(){

  const userRef = db.collection("users").doc(currentUser.uid);
  const doc = await userRef.get();

  const now = Date.now();
  const oneDay = 24 * 60 * 60 * 1000;

  if (!doc.exists) {

    await userRef.set({
      credits: 5,
      lastReset: now,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    userCredits = 5;

  } else {

    const data = doc.data();
    const lastReset = data.lastReset || 0;

    if (now - lastReset > oneDay) {

      await userRef.update({
        credits: 5,
        lastReset: now
      });

      userCredits = 5;

    } else {

      userCredits = data.credits || 0;
    }
  }

  updateUsageUI();
}

/* LOAD HISTORY */
async function loadHistory(){

  const snap = await db.collection("users")
    .doc(currentUser.uid)
    .collection("images")
    .orderBy("createdAt","desc")
    .get();

  const historyDiv = document.getElementById("history");
  historyDiv.innerHTML = "";

  snap.forEach(doc=>{
    const data = doc.data();
    historyDiv.innerHTML += `
      <div>
        <img src="${data.imageUrl}">
        <p style="font-size:11px">${data.prompt}</p>
      </div>
    `;
  });
}

function updateUsageUI(){
  document.getElementById("usageText").innerText =
  "Credits: " + userCredits;
}

/* GENERATE */
document.getElementById("generateBtn").onclick = async function(){

  const prompt = document.getElementById("prompt").value.trim();
  if(!prompt) return;

  if(!currentUser){
    alert("Please login first.");
    return;
  }

  if(userCredits <= 0){
    alert("No credits left.");
    return;
  }

  try{

    const res = await fetch("/api/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt})
    });

    const data = await res.json();

    if(data.url){

      document.getElementById("result").innerHTML =
      '<img src="'+data.url+'">';

      await db.collection("users")
        .doc(currentUser.uid)
        .collection("images")
        .add({
          prompt: prompt,
          imageUrl: data.url,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

      userCredits--;

      await db.collection("users")
        .doc(currentUser.uid)
        .update({ credits: userCredits });

      updateUsageUI();
      loadHistory();
    }

  }catch(err){
    alert("Image generation failed.");
  }
};
</script>

</body>
</html>
