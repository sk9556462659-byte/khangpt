<!DOCTYPE html>
<html>

<head>

<title>KhanGPT AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0c29;
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
background:#14113b;
position:sticky;
top:0;
z-index:100;
}

.logo{
color:gold;
font-weight:bold;
font-size:16px;
}

.menu{
font-size:22px;
cursor:pointer;
}

.user{
font-size:18px;
cursor:pointer;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#1b1738;
padding:20px;
transition:.3s;
z-index:200;
}

.sidebar.open{
left:0;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
}

/* MAIN */

.main{
padding:20px 15px 120px;
text-align:center;
}

.main h1{
font-size:22px;
margin:10px 0 20px;
}

.cards{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}

.card{
background:#1b1738;
padding:14px;
border-radius:25px;
cursor:pointer;
}

/* RESULT */

#result img{
max-width:100%;
border-radius:10px;
margin-top:20px;
}

/* BOTTOM BAR */

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#14113b;
padding:10px;
display:flex;
gap:6px;
}

.bottom input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
}

.bottom button{
padding:10px 12px;
border:none;
border-radius:8px;
background:gold;
font-weight:bold;
}

/* LOGIN BUTTON */

.login-btn{
background:gold;
border:none;
padding:8px 10px;
border-radius:8px;
cursor:pointer;
font-size:12px;
}

.footer{
margin-top:20px;
font-size:14px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h3>KhanGPT</h3>

<a href="dashboard.html">Dashboard</a>
<a href="gallery.html">Gallery</a>
<a href="trending.html">Trending</a>
<a href="prompt-library.html">Prompt Library</a>
<a href="buy.html">Buy Credits</a>
<a href="account.html">Account</a>

</div>

<!-- HEADER -->

<div class="header">

<div class="menu" onclick="toggleMenu()">☰</div>

<div class="logo">KhanGPT AI</div>

<div id="userArea">

<button class="login-btn" onclick="login()">Login</button>

</div>

</div>

<!-- MAIN -->

<div class="main">

<h2>Hi 👋</h2>

<h1>What would you like to create?</h1>

<div class="cards">

<div class="card" onclick="setPrompt('ultra realistic ai art')">
🖼 Create Image
</div>

<div class="card">
🎬 Create Video (Coming Soon)
</div>

<div class="card" onclick="location.href='gallery.html'">
🎨 Explore Gallery
</div>

<div class="card" onclick="location.href='prompt-library.html'">
⚡ AI Prompt Ideas
</div>

</div>

<div id="result"></div>

<div class="footer">

<p id="creditsText">Credits: 0</p>

</div>

</div>

<!-- BOTTOM GENERATOR -->

<div class="bottom">

<input id="prompt" placeholder="Describe your image...">

<button onclick="generate()">Generate</button>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {

apiKey:"AIzaSyDLvIHX6lGZGC7YViPH5Pf3Sc9AV7-BcM4",

authDomain:"khangpt-4176b.firebaseapp.com",

projectId:"khangpt-4176b"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser=null;
let userCredits=0;

/* SIDEBAR */

function toggleMenu(){

document.getElementById("sidebar").classList.toggle("open");

}

/* LOGIN */

async function login(){

const provider=new firebase.auth.GoogleAuthProvider();

await auth.signInWithPopup(provider);

}

/* LOGOUT */

function logout(){

auth.signOut();

}

/* AUTH STATE */

auth.onAuthStateChanged(async(user)=>{

if(user){

currentUser=user;

document.getElementById("userArea").innerHTML=

'<span>'+user.displayName+'</span> <button class="login-btn" onclick="logout()">Logout</button>';

const ref=db.collection("users").doc(user.uid);

const doc=await ref.get();

if(!doc.exists){

await ref.set({

credits:5

});

userCredits=5;

}else{

userCredits=doc.data().credits || 0;

}

updateCredits();

}

});

/* UPDATE CREDITS */

function updateCredits(){

document.getElementById("creditsText").innerText="Credits: "+userCredits;

}

/* PROMPT */

function setPrompt(text){

document.getElementById("prompt").value=text;

}

/* GENERATE */

async function generate(){

const prompt=document.getElementById("prompt").value;

if(!currentUser){

alert("Login first");

return;

}

if(userCredits<=0){

alert("No credits left");

return;

}

document.getElementById("result").innerHTML="Generating...";

const res=await fetch("/api/generate",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({prompt})

});

const data=await res.json();

document.getElementById("result").innerHTML=

'<img src="'+data.url+'">';

userCredits--;

await db.collection("users").doc(currentUser.uid).update({

credits:userCredits

});

updateCredits();

}

</script>

</body>
</html>
