<!DOCTYPE html>
<html>
<head>
<title>KhanGPT Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#1a1a2e);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}
@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}
.container{
width:92%;
max-width:520px;
padding:35px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(25px);
box-shadow:0 20px 50px rgba(0,0,0,0.6);
text-align:center;
}
h1{
font-size:30px;
background:linear-gradient(90deg,gold,#ffdd55,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-top:15px;
font-size:15px;
background:rgba(255,255,255,0.15);
color:white;
}
button{
margin-top:18px;
padding:14px 25px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,gold,#ffcc00);
font-weight:bold;
cursor:pointer;
}
.loader{
margin-top:20px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid gold;
border-radius:50%;
width:35px;
height:35px;
animation:spin 1s linear infinite;
display:none;
margin-left:auto;
margin-right:auto;
}
@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
#result img{
margin-top:25px;
max-width:100%;
border-radius:15px;
}
.error{
margin-top:15px;
color:#ff6b6b;
}
</style>
</head>

<body>

<div class="container">
<h1>KhanGPT Premium</h1>
<p>Ultra AI Image Generator</p>

<input type="text" id="prompt" placeholder="Enter your creative prompt...">

<button onclick="generateImage()">Generate</button>

<div class="loader" id="loader"></div>
<div id="result"></div>
<div class="error" id="error"></div>
</div>

<script>

let generatedImageUrl = "";

async function generateImage(){

const prompt=document.getElementById("prompt").value.trim();
const loader=document.getElementById("loader");
const result=document.getElementById("result");
const errorBox=document.getElementById("error");

errorBox.innerHTML="";
result.innerHTML="";

if(!prompt){
errorBox.innerHTML="Please enter a prompt.";
return;
}

loader.style.display="block";

try{

const response=await fetch("/api/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt})
});

const data=await response.json();

if(data.url){

generatedImageUrl = data.url;

result.innerHTML =
'<img src="'+data.url+'" id="generatedImg"/>' +
'<br><br><button onclick="downloadImage()">Download</button>';

}else{
errorBox.innerHTML="Generation failed.";
}

}catch(e){
errorBox.innerHTML="Server error.";
}

loader.style.display="none";
}

async function downloadImage(){

if(!generatedImageUrl) return;

try{
const response = await fetch(generatedImageUrl);
const blob = await response.blob();
const blobUrl = window.URL.createObjectURL(blob);
const link = document.createElement("a");
link.href = blobUrl;
link.download = "khangpt-image.png";
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
window.URL.revokeObjectURL(blobUrl);
}catch(e){
alert("Download failed.");
}

}

</script>

</body>
</html>
