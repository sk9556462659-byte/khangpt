<!DOCTYPE html>
<html>
<head>
<title>KhanGPT Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#1a1a2e);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:92%;
max-width:520px;
padding:35px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(25px);
box-shadow:0 20px 50px rgba(0,0,0,0.6);
text-align:center;
animation:fadeIn 1s ease;
}

h1{
margin-bottom:5px;
font-size:30px;
background:linear-gradient(90deg,gold,#ffdd55,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
font-size:14px;
opacity:0.85;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-top:10px;
font-size:15px;
outline:none;
background:rgba(255,255,255,0.15);
color:white;
}

input::placeholder{
color:#ddd;
}

.button-group{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

button{
margin-top:18px;
padding:14px 25px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,gold,#ffcc00);
font-weight:bold;
cursor:pointer;
font-size:14px;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px gold;
}

button.secondary{
background:#555;
color:white;
}

button:disabled{
opacity:0.6;
cursor:not-allowed;
}

.loader{
margin-top:20px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid gold;
border-radius:50%;
width:35px;
height:35px;
animation:spin 1s linear infinite;
display:none;
margin-left:auto;
margin-right:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

#result img{
margin-top:25px;
max-width:100%;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
animation:fadeIn 0.7s ease;
}

.error{
margin-top:15px;
color:#ff6b6b;
font-size:13px;
min-height:18px;
}

.footer{
margin-top:22px;
font-size:12px;
opacity:0.6;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<h1>KhanGPT Premium</h1>
<div class="subtitle">Ultra AI Image Generator • Professional Edition</div>

<input type="text" id="prompt" placeholder="Enter your creative prompt...">

<div class="button-group">
<button id="generateBtn" onclick="generateImage()">Generate</button>
<button class="secondary" onclick="clearResult()">Clear</button>
</div>

<div class="loader" id="loader"></div>

<div id="result"></div>
<div class="error" id="error"></div>

<div class="footer">
Premium AI System • Secure • Ultra Fast • Daily Free Limit: 5
</div>

</div>

<script>

/* ===== DAILY LIMIT SYSTEM ===== */

const MAX_DAILY = 5;

function getTodayKey(){
  const today = new Date();
  return "usage_" + today.toISOString().split('T')[0];
}

function getUsage(){
  return parseInt(localStorage.getItem(getTodayKey())) || 0;
}

function increaseUsage(){
  localStorage.setItem(getTodayKey(), getUsage() + 1);
}

/* ===== IMAGE GENERATION ===== */

async function generateImage(){
const prompt=document.getElementById("prompt").value.trim();
const loader=document.getElementById("loader");
const result=document.getElementById("result");
const errorBox=document.getElementById("error");
const btn=document.getElementById("generateBtn");

errorBox.innerHTML="";
result.innerHTML="";

if(!prompt){
errorBox.innerHTML="Please enter a prompt.";
return;
}

/* Daily Limit Check */
if(getUsage() >= MAX_DAILY){
errorBox.innerHTML="Daily free limit reached. Come back tomorrow or upgrade to Premium.";
return;
}

loader.style.display="block";
btn.disabled=true;

try{
const response=await fetch("/api/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt})
});

const data=await response.json();

if(data.url){
increaseUsage();
result.innerHTML=
'<img src="'+data.url+'" id="generatedImg"/>' +
'<br><br><button onclick="downloadImage()">Download</button>';
}else{
errorBox.innerHTML="Error generating image.";
}

}catch(e){
errorBox.innerHTML="Server error. Try later.";
}

loader.style.display="none";
btn.disabled=false;
}

function clearResult(){
document.getElementById("result").innerHTML="";
document.getElementById("error").innerHTML="";
}

function downloadImage(){
const img=document.getElementById("generatedImg");
if(!img) return;
const link=document.createElement("a");
link.href=img.src;
link.download="khangpt-image.png";
link.click();
}

</script>

</body>
</html>
