<script>

/* ===== DAILY LIMIT SYSTEM ===== */

const MAX_DAILY = 5;

function getTodayKey(){
  const today = new Date();
  return "usage_" + today.toISOString().split('T')[0];
}

function getUsage(){
  return parseInt(localStorage.getItem(getTodayKey())) || 0;
}

function increaseUsage(){
  localStorage.setItem(getTodayKey(), getUsage() + 1);
}

/* ===== IMAGE GENERATION ===== */

let generatedImageUrl = "";

async function generateImage(){

const prompt=document.getElementById("prompt").value.trim();
const loader=document.getElementById("loader");
const result=document.getElementById("result");
const errorBox=document.getElementById("error");
const btn=document.getElementById("generateBtn");

errorBox.innerHTML="";
result.innerHTML="";

if(!prompt){
errorBox.innerHTML="Please enter a prompt.";
return;
}

/* Daily Limit Check */
if(getUsage() >= MAX_DAILY){
errorBox.innerHTML="Daily free limit reached. Come back tomorrow or upgrade to Premium.";
return;
}

loader.style.display="block";
btn.disabled=true;

try{

const response=await fetch("/api/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt})
});

const data=await response.json();

if(data.url){

generatedImageUrl = data.url;
increaseUsage();

result.innerHTML =
'<img src="'+data.url+'" id="generatedImg"/>' +
'<br><br><button onclick="downloadImage()">Download</button>';

}else{
errorBox.innerHTML="Error generating image.";
}

}catch(e){
errorBox.innerHTML="Server error. Try later.";
}

loader.style.display="none";
btn.disabled=false;
}

function clearResult(){
document.getElementById("result").innerHTML="";
document.getElementById("error").innerHTML="";
generatedImageUrl="";
}

/* ===== SAFE DOWNLOAD FUNCTION ===== */

async function downloadImage(){

if(!generatedImageUrl) return;

try{

const response = await fetch(generatedImageUrl);
const blob = await response.blob();

const blobUrl = window.URL.createObjectURL(blob);

const link = document.createElement("a");
link.href = blobUrl;
link.download = "khangpt-image.png";
document.body.appendChild(link);
link.click();

document.body.removeChild(link);
window.URL.revokeObjectURL(blobUrl);

}catch(e){
alert("Download failed. Please try again.");
}

}

</script>
