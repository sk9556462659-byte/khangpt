<!DOCTYPE html>
<html>
<head>
<title>KhanGPT AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:90%;
max-width:500px;
padding:30px;
border-radius:20px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(15px);
box-shadow:0 8px 32px rgba(0,0,0,0.5);
text-align:center;
}

h1{
margin-bottom:10px;
font-size:28px;
letter-spacing:1px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:15px;
font-size:16px;
outline:none;
}

button{
margin-top:15px;
padding:14px 25px;
border:none;
border-radius:10px;
background:gold;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#ffd700;
}

img{
margin-top:20px;
max-width:100%;
border-radius:12px;
}

.footer{
margin-top:15px;
font-size:12px;
opacity:0.7;
}
</style>
</head>

<body>

<div class="container">
<h1>KhanGPT AI</h1>
<p>Create Stunning AI Images</p>

<input type="text" id="prompt" placeholder="Enter your prompt...">

<button onclick="generateImage()">Generate</button>

<div id="result"></div>

<div class="footer">
Premium AI • Secure System • Fast Generation
</div>

</div>

<script>
async function generateImage(){
const prompt = document.getElementById("prompt").value;
if(!prompt){
alert("Enter prompt first");
return;
}

const response = await fetch("/api/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt})
});

const data = await response.json();

if(data.url){
document.getElementById("result").innerHTML =
'<img src="'+data.url+'" />';
}else{
alert("Error generating image");
}
}
</script>

</body>
</html>
