<!DOCTYPE html>
<html>
<head>

<title>KhanGPT AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0c29;
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#14113b;
}

.logo{
font-size:20px;
color:gold;
font-weight:bold;
}

.menu-btn{
font-size:22px;
cursor:pointer;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:#1b1738;
padding:20px;
transition:.3s;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
}

.sidebar.open{
left:0;
}

/* MAIN */

.main{
padding:20px;
text-align:center;
}

/* SUGGESTION BUTTONS */

.suggestions{
display:flex;
flex-direction:column;
gap:10px;
margin-top:20px;
}

.suggestions button{
padding:12px;
border:none;
border-radius:20px;
background:#222;
color:white;
}

/* GENERATOR */

.generator{
margin-top:30px;
}

input{
width:90%;
max-width:500px;
padding:12px;
border-radius:10px;
border:none;
}

button.generate{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:10px;
background:gold;
font-weight:bold;
}

/* RESULT */

#result img{
margin-top:20px;
max-width:90%;
border-radius:10px;
}

/* FOOTER */

.footer{
text-align:center;
padding:20px;
margin-top:40px;
background:#14113b;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h3>KhanGPT</h3>

<a href="#">Dashboard</a>
<a href="gallery.html">Gallery</a>
<a href="trending.html">Trending</a>
<a href="buy.html">Buy Credits</a>
<a href="account.html">Account</a>

</div>

<!-- HEADER -->

<div class="header">

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="logo">KhanGPT AI</div>

<div>👤</div>

</div>

<!-- MAIN -->

<div class="main">

<h2>Hi 👋</h2>

<h1>What would you like to create?</h1>

<!-- SUGGESTIONS -->

<div class="suggestions">

<button onclick="setPrompt('ultra realistic ai art')">
🖼 Create Image
</button>

<button onclick="alert('Video generator coming soon')">
🎬 Create Video (Coming Soon)
</button>

<button onclick="location.href='gallery.html'">
🎨 Explore Gallery
</button>

<button onclick="setPrompt('youtube thumbnail dramatic lighting')">
⚡ AI Prompt Ideas
</button>

</div>

<!-- GENERATOR -->

<div class="generator">

<input id="prompt" placeholder="Describe your image...">

<br>

<button class="generate" onclick="generate()">
Generate Image
</button>

<p id="credits">Credits: 5</p>

<div id="result"></div>

</div>

</div>

<!-- FOOTER -->

<div class="footer">

© 2026 KhanGPT AI

</div>

<script>

/* SIDEBAR */

function toggleMenu(){

const menu=document.getElementById("sidebar");

menu.classList.toggle("open");

}

/* SET PROMPT */

function setPrompt(text){

document.getElementById("prompt").value=text;

}

/* GENERATE IMAGE */

async function generate(){

const prompt=document.getElementById("prompt").value;

if(!prompt){

alert("Enter prompt");

return;

}

document.getElementById("result").innerHTML="Generating...";

const res=await fetch("/api/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({prompt})

});

const data=await res.json();

document.getElementById("result").innerHTML=

'<img src="'+data.url+'">';

}

</script>

</body>
</html>
