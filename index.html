<!DOCTYPE html>
<html>
<head>
    <title>KhanGPT Test</title>
    <style>
        body { 
            background: #0a0a0f; 
            color: white; 
            font-family: Arial; 
            margin: 0;
            padding: 20px;
        }
        .test-btn { 
            padding: 20px; 
            margin: 10px; 
            background: #6366f1; 
            border: none; 
            color: white; 
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            display: block;
            width: 100%;
        }
        .result {
            background: #1a1a2e;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>🧪 KhanGPT Test</h1>
    
    <button class="test-btn" onclick="testMenu()">Test 1: Menu Button</button>
    <div id="menuResult" class="result">Click to test...</div>
    
    <button class="test-btn" onclick="testLogin()">Test 2: Login Button</button>
    <div id="loginResult" class="result">Click to test...</div>
    
    <button class="test-btn" onclick="testCard()">Test 3: Cards</button>
    <div id="cardResult" class="result">Click to test...</div>
    
    <button class="test-btn" onclick="checkFirebase()">Test 4: Firebase</button>
    <div id="firebaseResult" class="result">Click to test...</div>

    <script>
        // Test 1: Menu
        function testMenu() {
            document.getElementById('menuResult').innerHTML = 
                '<span style="color: #10b981;">✅ Menu button WORKING!</span>';
            alert('Menu button clicked!');
        }
        
        // Test 2: Login
        function testLogin() {
            document.getElementById('loginResult').innerHTML = 
                '<span style="color: #10b981;">✅ Login button WORKING!</span>';
            alert('Login button clicked!');
        }
        
        // Test 3: Cards
        function testCard() {
            document.getElementById('cardResult').innerHTML = 
                '<span style="color: #10b981;">✅ Cards WORKING!</span>';
            alert('Card clicked!');
        }
        
        // Test 4: Firebase
        function checkFirebase() {
            if (typeof firebase !== 'undefined') {
                document.getElementById('firebaseResult').innerHTML = 
                    '<span style="color: #10b981;">✅ Firebase LOADED!</span>';
            } else {
                document.getElementById('firebaseResult').innerHTML = 
                    '<span style="color: #ef4444;">❌ Firebase NOT loaded!</span><br>Check internet connection';
            }
        }
    </script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
</body>
</html>
