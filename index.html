<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhanGPT AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #14141f;
            --bg-card: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #6366f1;
            --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gold: #f59e0b;
            --border: rgba(255,255,255,0.1);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        /* Header */
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 65px;
            background: var(--bg-secondary); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 1000;
        }
        .menu-btn { width: 45px; height: 45px; border: none; background: var(--bg-card); color: var(--text-primary); border-radius: 12px; font-size: 20px; cursor: pointer; }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-btn { padding: 10px 20px; background: var(--accent-gradient); border: none; color: white; border-radius: 25px; font-weight: 600; cursor: pointer; }
        /* Sidebar */
        .sidebar { position: fixed; top: 65px; left: -300px; width: 280px; height: calc(100% - 65px); background: var(--bg-secondary); border-right: 1px solid var(--border); transition: left 0.3s ease; z-index: 999; padding: 20px; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .sidebar-overlay { position: fixed; top: 65px; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); opacity: 0; visibility: hidden; transition: all 0.3s; z-index: 998; }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 15px; margin-bottom: 8px; border-radius: 12px; color: var(--text-primary); cursor: pointer; background: var(--bg-card); }
        .nav-item:hover { background: var(--accent); }
        .credits-box { background: var(--accent-gradient); padding: 20px; border-radius: 16px; margin-top: 20px; text-align: center; color: white; }
        .credits-amount { font-size: 36px; font-weight: 800; margin: 10px 0; }
        /* Main UI */
        .main { margin-top: 65px; padding: 20px; padding-bottom: 120px; }
        .mode-tabs { display: flex; gap: 10px; margin-bottom: 30px; overflow-x: auto; }
        .mode-tab { flex: 1; padding: 15px; border-radius: 16px; border: 2px solid var(--border); background: var(--bg-card); color: var(--text-primary); font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; white-space: nowrap; }
        .mode-tab.active { background: var(--accent-gradient); border-color: transparent; }
        .welcome { text-align: center; padding: 40px 20px; }
        .welcome h1 { font-size: 32px; margin-bottom: 10px; background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: 0 auto; }
        .quick-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 25px 15px; text-align: center; cursor: pointer; transition: transform 0.2s; }
        .quick-card:active { transform: scale(0.95); }
        .quick-card i { font-size: 32px; margin-bottom: 12px; color: var(--accent); }
        /* Chat Design */
        .chat-box { display: none; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .message { display: flex; gap: 10px; max-width: 85%; }
        .message.user { margin-left: auto; flex-direction: row-reverse; }
        .msg-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; background: var(--accent-gradient); color: white; flex-shrink: 0; }
        .message.user .msg-avatar { background: linear-gradient(135deg, #f59e0b, #ef4444); }
        .msg-bubble { background: var(--bg-card); padding: 12px 18px; border-radius: 20px; line-height: 1.5; font-size: 15px; word-wrap: break-word; }
        .message.user .msg-bubble { background: var(--accent-gradient); }
        /* Input Area */
        .input-area { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-secondary); padding: 15px; border-top: 1px solid var(--border); }
        .input-box { display: flex; gap: 10px; align-items: flex-end; max-width: 800px; margin: 0 auto; }
        .input-wrapper { flex: 1; display: flex; align-items: center; gap: 10px; background: var(--bg-card); border-radius: 25px; padding: 5px 15px; }
        #userInput { flex: 1; background: transparent; border: none; color: var(--text-primary); font-size: 16px; padding: 12px 0; outline: none; resize: none; max-height: 100px; }
        .send-btn { width: 50px; height: 50px; border: none; background: var(--accent-gradient); color: white; border-radius: 50%; cursor: pointer; font-size: 20px; }
        .loading { display: none; text-align: center; padding: 20px; }
        .loading.active { display: block; }
        .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #333; color: white; padding: 12px 25px; border-radius: 25px; opacity: 0; transition: all 0.3s; z-index: 2000; font-size: 14px; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div class="header">
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <div class="logo">⚡ KhanGPT</div>
        <button class="login-btn" onclick="handleLogin()"><i class="fas fa-user"></i> <span id="loginText">Login</span></button>
    </div>

    <div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <div class="nav-item" onclick="goToPage('dashboard.html')"><i class="fas fa-home"></i> Dashboard</div>
        <div class="nav-item" onclick="switchMode('chat')"><i class="fas fa-comments"></i> AI Chat</div>
        <div class="nav-item" onclick="switchMode('image')"><i class="fas fa-image"></i> Create Image</div>
        <div class="nav-item" onclick="switchMode('video')"><i class="fas fa-video"></i> Create Video</div>
        <div class="credits-box">
            <div style="font-size: 14px;">Credits</div>
            <div class="credits-amount" id="creditsDisplay">0</div>
        </div>
    </div>

    <div class="main">
        <div class="mode-tabs">
            <button class="mode-tab active" onclick="switchMode('chat')" id="tab-chat"><i class="fas fa-comments"></i> Chat</button>
            <button class="mode-tab" onclick="switchMode('image')" id="tab-image"><i class="fas fa-image"></i> Image</button>
            <button class="mode-tab" onclick="switchMode('video')" id="tab-video"><i class="fas fa-video"></i> Video</button>
        </div>

        <div class="welcome" id="welcomeScreen">
            <h1>👋 Hello!</h1>
            <p>What would you like to create?</p>
            <div class="quick-grid">
                <div class="quick-card" onclick="quickPrompt('Explain photosynthesis')"><i class="fas fa-brain"></i><h3>Learn</h3></div>
                <div class="quick-card" onclick="quickPrompt('Generate a space cat')"><i class="fas fa-image"></i><h3>Image</h3></div>
            </div>
        </div>

        <div class="chat-box" id="chatBox"></div>
        <div class="loading" id="loading"><div class="spinner"></div><p>Thinking...</p></div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <div class="input-wrapper">
                <button class="menu-btn" style="background:transparent; font-size:16px;" onclick="showToast('Attach coming soon')"><i class="fas fa-paperclip"></i></button>
                <textarea id="userInput" placeholder="Ask me anything..." rows="1" onkeypress="handleKey(event)"></textarea>
            </div>
            <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="toast" id="toast">Message</div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLvIHX6lGZGC7YViPH5Pf3Sc9AV7-BcM4",
            authDomain: "khangpt-4176b.firebaseapp.com",
            projectId: "khangpt-4176b"
        };

        const GEMINI_API_KEY = "AIzaSyBt4kkNuPijCXsTJFptYxSURkb02Lfc0rQ"; 

        let auth, db, currentUser = null, userCredits = 0, currentMode = 'chat';

        try {
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    document.getElementById('loginText').textContent = 'Logout';
                    loadUserCredits(user.uid);
                } else {
                    currentUser = null;
                    document.getElementById('loginText').textContent = 'Login';
                    document.getElementById('creditsDisplay').textContent = '0';
                }
            });
        } catch (e) { console.error(e); }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function handleLogin() {
            if (currentUser) { auth.signOut(); showToast('Logged out'); }
            else {
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider).then(() => showToast('Welcome!')).catch(e => showToast('Login failed'));
            }
        }

        async function loadUserCredits(uid) {
            const doc = await db.collection('users').doc(uid).get();
            if (doc.exists) {
                userCredits = doc.data().credits || 0;
            } else {
                userCredits = 10;
                await db.collection('users').doc(uid).set({ credits: 10, createdAt: new Date() });
            }
            document.getElementById('creditsDisplay').textContent = userCredits;
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + mode).classList.add('active');
            document.getElementById('userInput').placeholder = mode === 'chat' ? 'Ask anything...' : 'Describe...';
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text || !currentUser) return showToast(currentUser ? 'Type something' : 'Login first');
            if (userCredits <= 0) return showToast('No credits left');

            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('chatBox').style.display = 'flex';
            addMessage(text, 'user');
            input.value = '';
            document.getElementById('loading').classList.add('active');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                const data = await response.json();
                const aiMsg = data.candidates[0].content.parts[0].text;
                
                document.getElementById('loading').classList.remove('active');
                addMessage(aiMsg, 'ai');

                userCredits--;
                document.getElementById('creditsDisplay').textContent = userCredits;
                db.collection('users').doc(currentUser.uid).update({ credits: userCredits });
            } catch (e) {
                document.getElementById('loading').classList.remove('active');
                addMessage("Error connecting to AI.", "ai");
            }
        }

        function addMessage(text, sender) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            const formatted = text.replace(/\n/g, '<br>');
            div.innerHTML = `<div class="msg-avatar">${sender === 'user' ? 'U' : 'K'}</div><div class="msg-bubble">${formatted}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
        function quickPrompt(t) { document.getElementById('userInput').value = t; sendMessage(); }
        function goToPage(u) { window.location.href = u; }
    </script>
</body>
</html>
