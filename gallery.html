<!DOCTYPE html>
<html>
<head>
<title>KhanGPT Gallery</title>

<style>

body{
background:#0f0c29;
color:white;
font-family:Arial;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,220px);
gap:20px;
justify-content:center;
margin-top:30px;
}

.card{
background:#1b1738;
padding:10px;
border-radius:10px;
}

img{
width:200px;
border-radius:10px;
}

.prompt{
font-size:11px;
opacity:.7;
margin-top:6px;
}

button{
margin-top:5px;
padding:6px 10px;
border:none;
border-radius:6px;
background:gold;
cursor:pointer;
font-weight:bold;
}

.likes{
font-size:13px;
margin-top:4px;
color:gold;
}

</style>

</head>

<body>

<h1>Public AI Gallery</h1>

<div id="gallery" class="grid"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey:"AIzaSyDLvIHX6lGZGC7YViPH5Pf3Sc9AV7-BcM4",
authDomain:"khangpt-4176b.firebaseapp.com",
projectId:"khangpt-4176b"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

loadGallery();

async function loadGallery(){

const snap = await db.collectionGroup("images").get();

const gallery = document.getElementById("gallery");

gallery.innerHTML="";

snap.forEach(doc=>{

const data = doc.data();

gallery.innerHTML +=

'<div class="card">'+
'<img src="'+data.imageUrl+'">'+

'<div class="likes">'+(data.likes || 0)+' ❤️</div>'+

'<div class="prompt">'+(data.prompt || "")+'</div>'+

'<button onclick="likeImage(\''+doc.id+'\')">Like</button>'+

'<button onclick="copyPrompt(\''+encodeURIComponent(data.prompt || "")+'\')">Copy Prompt</button>'+

'<button onclick="remixPrompt(\''+encodeURIComponent(data.prompt || "")+'\')">Remix</button>'+

'</div>';

});

}

async function likeImage(id){

const snap = await db.collectionGroup("images").get();

snap.forEach(async(doc)=>{

if(doc.id===id){

await doc.ref.update({
likes: firebase.firestore.FieldValue.increment(1)
});

}

});

location.reload();

}

function copyPrompt(prompt){

const text = decodeURIComponent(prompt);

navigator.clipboard.writeText(text);

alert("Prompt copied!");

}

function remixPrompt(prompt){

const text = decodeURIComponent(prompt);

window.location.href = "/?prompt="+encodeURIComponent(text);

}

</script>

</body>
</html>
