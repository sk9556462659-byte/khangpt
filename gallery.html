<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhanGPT Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #14141f;
            --bg-card: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #6366f1;
            --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gold: #f59e0b;
            --border: rgba(255,255,255,0.1);
        }

        .light-mode {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-card: #f1f3f4;
            --text-primary: #1a1a2e;
            --text-secondary: #5f6368;
            --border: rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            border: none;
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: var(--accent);
            color: white;
        }

        .back-btn {
            text-decoration: none;
        }

        /* Main Content */
        .main {
            margin-top: 70px;
            padding: 30px;
        }

        /* Title Section */
        .title-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .title-section h1 {
            font-size: 36px;
            margin-bottom: 10px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title-section p {
            color: var(--text-secondary);
        }

        /* Search & Filter Bar */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .search-box i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .filter-dropdown {
            position: relative;
        }

        .filter-btn {
            padding: 15px 25px;
            border: 2px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 500;
        }

        .filter-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 10px;
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s;
            z-index: 100;
        }

        .filter-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .filter-option {
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .filter-option:hover, .filter-option.active {
            background: var(--accent);
            color: white;
        }

        .bulk-actions {
            display: none;
            gap: 10px;
        }

        .bulk-actions.active {
            display: flex;
        }

        .bulk-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bulk-btn.delete {
            background: #ef4444;
            color: white;
        }

        .bulk-btn.cancel {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        /* Category Pills */
        .categories {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .category-pill {
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            border-radius: 25px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .category-pill:hover, .category-pill.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Masonry Grid */
        .masonry-grid {
            column-count: 5;
            column-gap: 20px;
        }

        @media (max-width: 1400px) { .masonry-grid { column-count: 4; } }
        @media (max-width: 1100px) { .masonry-grid { column-count: 3; } }
        @media (max-width: 768px) { .masonry-grid { column-count: 2; column-gap: 15px; } }
        @media (max-width: 480px) { .masonry-grid { column-count: 1; } }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 20px;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: var(--bg-card);
            cursor: pointer;
            transition: transform 0.3s;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-item.selected {
            box-shadow: 0 0 0 4px var(--accent);
        }

        .gallery-item img, .gallery-item video {
            width: 100%;
            display: block;
            border-radius: 16px;
        }

        .select-checkbox {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 28px;
            height: 28px;
            border: 2px solid white;
            border-radius: 50%;
            background: rgba(0,0,0,0.3);
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            z-index: 10;
        }

        .gallery-item:hover .select-checkbox,
        .gallery-item.selected .select-checkbox {
            display: flex;
        }

        .gallery-item.selected .select-checkbox {
            background: var(--accent);
            border-color: var(--accent);
        }

        .item-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .gallery-item:hover .item-overlay {
            opacity: 1;
        }

        .item-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .item-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }

        .item-btn:hover {
            background: white;
            color: black;
        }

        .item-prompt {
            font-size: 13px;
            color: rgba(255,255,255,0.9);
            margin-top: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-align: left;
        }

        .item-stats {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
        }

        .item-stats span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Loading */
        .loading-container {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Load More */
        .load-more {
            text-align: center;
            padding: 40px;
        }

        .load-more-btn {
            padding: 15px 40px;
            border: 2px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .load-more-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }

        .lightbox img, .lightbox video {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 12px;
        }

        .lightbox-close {
            position: absolute;
            top: -50px;
            right: 0;
            width: 45px;
            height: 45px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
        }

        .lightbox-nav:hover {
            background: white;
            color: black;
        }

        .lightbox-prev { left: -70px; }
        .lightbox-next { right: -70px; }

        .lightbox-info {
            position: absolute;
            bottom: -80px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
        }

        .lightbox-prompt {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .lightbox-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .lightbox-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lightbox-btn.primary {
            background: var(--accent-gradient);
            color: white;
        }

        .lightbox-btn.secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 100px 20px;
        }

        .empty-state i {
            font-size: 80px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: var(--text-secondary);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 3000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success { border-color: #10b981; }
        .toast.error { border-color: #ef4444; }

        /* Selection Mode Toggle */
        .selection-toggle {
            padding: 12px 20px;
            border: 2px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .selection-toggle.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Mobile */
        @media (max-width: 768px) {
            .header {
                padding: 0 15px;
            }

            .main {
                padding: 20px 15px;
            }

            .title-section h1 {
                font-size: 28px;
            }

            .controls {
                flex-direction: column;
                width: 100%;
            }

            .search-box {
                max-width: 100%;
                width: 100%;
            }

            .lightbox-prev, .lightbox-next {
                display: none;
            }

            .lightbox-info {
                bottom: -100px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="dashboard.html" class="icon-btn back-btn">
            <i class="fas fa-arrow-left"></i>
        </a>
        
        <div class="logo">
            <i class="fas fa-images"></i> KhanGPT Gallery
        </div>
        
        <div class="header-actions">
            <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <button class="icon-btn" onclick="toggleSelectionMode()" title="Select multiple">
                <i class="fas fa-check-square"></i>
            </button>
        </div>
    </header>

    <!-- Main -->
    <main class="main">
        <!-- Title -->
        <div class="title-section">
            <h1>Public AI Gallery</h1>
            <p>Discover amazing AI creations from our community</p>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search creations..." onkeyup="searchGallery()">
            </div>
            
            <div class="filter-dropdown">
                <button class="filter-btn" onclick="toggleFilter()">
                    <i class="fas fa-filter"></i> Filter <i class="fas fa-chevron-down"></i>
                </button>
                <div class="filter-menu" id="filterMenu">
                    <div class="filter-option active" onclick="setFilter('all')">
                        <i class="fas fa-th"></i> All
                    </div>
                    <div class="filter-option" onclick="setFilter('images')">
                        <i class="fas fa-image"></i> Images
                    </div>
                    <div class="filter-option" onclick="setFilter('videos')">
                        <i class="fas fa-video"></i> Videos
                    </div>
                    <div class="filter-option" onclick="setFilter('liked')">
                        <i class="fas fa-heart"></i> Most Liked
                    </div>
                    <div class="filter-option" onclick="setFilter('recent')">
                        <i class="fas fa-clock"></i> Recent
                    </div>
                </div>
            </div>

            <button class="selection-toggle" id="selectionToggle" onclick="toggleSelectionMode()">
                <i class="fas fa-check-square"></i> Select
            </button>

            <div class="bulk-actions" id="bulkActions">
                <span id="selectedCount">0 selected</span>
                <button class="bulk-btn delete" onclick="deleteSelected()">
                    <i class="fas fa-trash"></i> Delete
                </button>
                <button class="bulk-btn cancel" onclick="cancelSelection()">
                    Cancel
                </button>
            </div>
        </div>

        <!-- Categories -->
        <div class="categories">
            <button class="category-pill active" onclick="filterCategory('all')">All</button>
            <button class="category-pill" onclick="filterCategory('islamic')">🕌 Islamic</button>
            <button class="category-pill" onclick="filterCa
