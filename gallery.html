<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhanGPT Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- CSS Section (Aapka Design) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f; --bg-secondary: #14141f; --bg-card: #1a1a2e;
            --text-primary: #ffffff; --text-secondary: #a0a0b0;
            --accent: #6366f1; --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gold: #f59e0b; --border: rgba(255,255,255,0.1);
        }
        .light-mode {
            --bg-primary: #f8f9fa; --bg-secondary: #ffffff; --bg-card: #f1f3f4;
            --text-primary: #1a1a2e; --text-secondary: #5f6368; --border: rgba(0,0,0,0.1);
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; transition: 0.3s; }

        /* Header */
        .header { position: fixed; top: 0; left: 0; right: 0; height: 70px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .icon-btn { width: 45px; height: 45px; border: none; background: var(--bg-card); color: var(--text-primary); border-radius: 12px; cursor: pointer; border: 1px solid var(--border); }

        /* Main Content */
        .main { margin-top: 70px; padding: 30px; }
        .title-section { text-align: center; margin-bottom: 30px; }
        .title-section h1 { font-size: 36px; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Search & Filter Bar */
        .controls { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; align-items: center; }
        .search-box { position: relative; flex: 1; max-width: 400px; }
        .search-box input { width: 100%; padding: 15px 20px 15px 50px; border: 2px solid var(--border); background: var(--bg-card); color: var(--text-primary); border-radius: 30px; outline: none; }
        .search-box i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }

        /* Masonry Grid */
        .masonry-grid { column-count: 4; column-gap: 20px; }
        @media (max-width: 1100px) { .masonry-grid { column-count: 3; } }
        @media (max-width: 768px) { .masonry-grid { column-count: 2; } }
        @media (max-width: 480px) { .masonry-grid { column-count: 1; } }

        .gallery-item { break-inside: avoid; margin-bottom: 20px; position: relative; border-radius: 16px; overflow: hidden; background: var(--bg-card); transition: 0.3s; cursor: pointer; }
        .gallery-item:hover { transform: translateY(-5px); }
        .gallery-item img, .gallery-item video { width: 100%; display: block; border-radius: 16px; }
        .gallery-item.selected { box-shadow: 0 0 0 4px var(--accent); }

        .item-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); opacity: 0; transition: 0.3s; }
        .gallery-item:hover .item-overlay { opacity: 1; }
        .item-prompt { font-size: 12px; color: white; margin-top: 5px; }

        .select-checkbox { position: absolute; top: 10px; left: 10px; width: 25px; height: 25px; background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 50%; display: none; align-items: center; justify-content: center; color: white; }
        .gallery-item:hover .select-checkbox, .gallery-item.selected .select-checkbox { display: flex; }
        .gallery-item.selected .select-checkbox { background: var(--accent); border-color: var(--accent); }

        /* Lightbox */
        .lightbox { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; padding: 20px; flex-direction: column; }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90%; max-height: 80vh; border-radius: 12px; }
        .lightbox-close { position: absolute; top: 20px; right: 20px; font-size: 30px; color: white; cursor: pointer; background: none; border: none; }
        .lightbox-info { margin-top: 15px; color: white; text-align: center; }

        /* Bulk Actions */
        .bulk-actions { display: none; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .bulk-actions.active { display: flex; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; }

        .loading-container { text-align: center; padding: 50px; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; display: none; }
    </style>
</head>
<body>

    <header class="header">
        <a href="dashboard.html" class="icon-btn" style="display: flex; align-items: center; justify-content: center; text-decoration: none;">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div class="logo">⚡ KhanGPT Gallery</div>
        <div style="display: flex; gap: 10px;">
            <button class="icon-btn" onclick="toggleSelectionMode()" id="selectionToggle"><i class="fas fa-check-square"></i></button>
            <button class="icon-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
        </div>
    </header>

    <main class="main">
        <div class="title-section">
            <h1>Your AI Gallery</h1>
            <p>All your generated masterpieces in one place</p>
        </div>

        <div class="controls">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search your creations..." onkeyup="searchGallery()">
            </div>
        </div>

        <div class="bulk-actions" id="bulkActions">
            <span id="selectedCount">0 selected</span>
            <button class="btn-delete" onclick="deleteSelected()">Delete Selected</button>
        </div>

        <div class="masonry-grid" id="galleryGrid">
            </div>
    </main>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <div id="lightboxMedia"></div>
        <div class="lightbox-info">
            <p id="lightboxPrompt"></p>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        // 1. Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDLvIHX6lGZGC7YViPH5Pf3Sc9AV7-BcM4",
            authDomain: "khangpt-4176b.firebaseapp.com",
            projectId: "khangpt-4176b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let isSelectionMode = false;
        let selectedItems = new Set();
        let allCreations = [];

        // 2. Auth Check & Load Data
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                loadGallery();
            } else {
                window.location.href = "index.html"; // Login nahi hai toh bahar bhej do
            }
        });

        // 3. Load Gallery function
        async function loadGallery() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '<div class="loading-container"><div class="spinner"></div><p>Loading your art...</p></div>';

            try {
                // Sirf login user ki images dikhane ke liye (Security)
                const snapshot = await db.collection('creations')
                                       .where('userId', '==', currentUser.uid)
                                       .orderBy('timestamp', 'desc')
                                       .get();
                
                grid.innerHTML = "";
                allCreations = [];

                if (snapshot.empty) {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 50px; opacity: 0.5;"><h3>No images yet!</h3><p>Go to Chat/Generator to create something.</p></div>';
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    data.id = doc.id;
                    allCreations.push(data);
                    
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.setAttribute('data-id', data.id);
                    item.onclick = (e) => handleItemClick(e, data);

                    const media = data.type === 'video' 
                        ? `<video src="${data.url}" muted loop></video>` 
                        : `<img src="${data.url}" loading="lazy">`;

                    item.innerHTML = `
                        <div class="select-checkbox"><i class="fas fa-check"></i></div>
                        ${media}
                        <div class="item-overlay">
                            <p class="item-prompt">${data.prompt.substring(0, 50)}...</p>
                        </div>
                    `;
                    grid.appendChild(item);
                });
            } catch (err) {
                console.error(err);
                grid.innerHTML = '<p style="text-align:center; color:red;">Error loading gallery. Check console.</p>';
            }
        }

        // 4. Handle Clicks
        function handleItemClick(e, data) {
            if (isSelectionMode) {
                const el = document.querySelector(`[data-id="${data.id}"]`);
                if (selectedItems.has(data.id)) {
                    selectedItems.delete(data.id);
                    el.classList.remove('selected');
                } else {
                    selectedItems.add(data.id);
                    el.classList.add('selected');
                }
                document.getElementById('selectedCount').textContent = `${selectedItems.size} selected`;
            } else {
                openLightbox(data);
            }
        }

        // 5. Lightbox
        function openLightbox(data) {
            const lb = document.getElementById('lightbox');
            const media = document.getElementById('lightboxMedia');
            media.innerHTML = data.type === 'video' ? `<video src="${data.url}" controls autoplay></video>` : `<img src="${data.url}">`;
            document.getElementById('lightboxPrompt').textContent = data.prompt;
            lb.classList.add('active');
        }

        function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }

        // 6. Selection Mode
        function toggleSelectionMode() {
            isSelectionMode = !isSelectionMode;
            document.getElementById('selectionToggle').classList.toggle('active');
            document.getElementById('bulkActions').classList.toggle('active');
            if (!isSelectionMode) {
                selectedItems.clear();
                document.querySelectorAll('.gallery-item').forEach(i => i.classList.remove('selected'));
            }
        }

        // 7. Delete Logic
        async function deleteSelected() {
            if (selectedItems.size === 0) return;
            if (confirm(`Delete ${selectedItems.size} items forever?`)) {
                for (let id of selectedItems) {
                    await db.collection('creations').doc(id).delete();
                }
                showToast("Deleted!");
                loadGallery();
                toggleSelectionMode();
            }
        }

        // 8. Search
        function searchGallery() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.gallery-item').forEach(item => {
                const prompt = item.querySelector('.item-prompt').textContent.toLowerCase();
                item.style.display = prompt.includes(q) ? "block" : "none";
            });
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('themeIcon');
            icon.className = document.body.classList.contains('light-mode') ? "fas fa-sun" : "fas fa-moon";
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.textContent = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
